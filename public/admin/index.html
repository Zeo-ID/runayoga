<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Runayoga</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="/admin/js-yaml.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #7a9a8a;
      --sage-light: #a3c4b4;
      --sage-dark: #5a7a6a;
      --beige: #f5f0e8;
      --beige-dark: #e8e0d4;
      --dark: #2d3436;
      --dark-light: #636e72;
      --white: #ffffff;
      --red: #d63031;
      --red-light: #fab1a0;
      --green: #00b894;
      --green-light: #dfe6e9;
      --sidebar-width: 280px;
      --header-height: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--beige);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--sage-dark);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-user {
      font-size: 13px;
      opacity: 0.9;
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .btn-logout:hover {
      background: rgba(255,255,255,0.25);
    }

    .btn-publish {
      background: #e17055;
      border: none;
      color: var(--white);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-publish:hover {
      background: #d35400;
    }

    .btn-publish:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }

    .btn-menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: var(--white);
      border-right: 1px solid var(--beige-dark);
      overflow-y: auto;
      z-index: 90;
      transition: transform 0.3s ease;
    }

    .sidebar-section {
      padding: 16px 0 4px 0;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--dark-light);
      padding: 0 20px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--dark);
      border-left: 3px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
    }

    .sidebar-item:hover {
      background: var(--beige);
    }

    .sidebar-item.active {
      background: var(--beige);
      border-left-color: var(--sage);
      color: var(--sage-dark);
      font-weight: 600;
    }

    .sidebar-item.sub {
      padding-left: 36px;
      font-size: 13px;
    }

    .sidebar-item .icon {
      margin-right: 10px;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .sidebar-btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 20px;
      padding: 8px 14px;
      background: var(--sage);
      color: var(--white);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .sidebar-btn-new:hover {
      background: var(--sage-dark);
    }

    /* Main content */
    .main {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
      padding: 32px;
    }

    /* Auth screen */
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height));
      text-align: center;
    }

    .auth-screen h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--dark);
    }

    .auth-screen p {
      color: var(--dark-light);
      margin-bottom: 24px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    .login-form input {
      padding: 12px 16px;
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-form input:focus {
      border-color: var(--sage);
    }

    .login-error {
      color: var(--red);
      font-size: 13px;
      min-height: 20px;
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--sage-dark);
      color: var(--white);
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      opacity: 0.85;
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Welcome screen */
    .welcome {
      max-width: 600px;
      margin: 60px auto;
      text-align: center;
    }

    .welcome h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--dark-light);
    }

    /* Editor */
    .editor {
      max-width: 860px;
      margin: 0 auto;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .editor-title {
      font-size: 22px;
      font-weight: 600;
    }

    .editor-path {
      font-size: 12px;
      color: var(--dark-light);
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--beige-dark);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--sage);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--sage-dark);
    }

    .btn-primary:disabled {
      background: var(--sage-light);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--white);
      color: var(--dark);
      border: 1px solid var(--beige-dark);
    }

    .btn-secondary:hover {
      background: var(--beige);
    }

    .btn-danger {
      background: var(--white);
      color: var(--red);
      border: 1px solid var(--red-light);
    }

    .btn-danger:hover {
      background: #ffeaea;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--dark);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--beige-dark);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: var(--white);
      color: var(--dark);
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,154,138,0.15);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-textarea.body-editor {
      min-height: 400px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
    }

    .form-checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--sage);
      cursor: pointer;
    }

    .form-checkbox-label {
      font-size: 14px;
      cursor: pointer;
    }

    /* List fields */
    .list-field {
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      background: var(--white);
      overflow: hidden;
    }

    .list-field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--beige);
      border-bottom: 1px solid var(--beige-dark);
    }

    .list-field-title {
      font-size: 13px;
      font-weight: 600;
    }

    .list-field-count {
      font-size: 12px;
      color: var(--dark-light);
      background: var(--white);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--sage);
      color: var(--white);
      border: none;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-add:hover {
      background: var(--sage-dark);
    }

    .list-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--beige);
      position: relative;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-item-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark-light);
      background: var(--beige);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .list-item-actions {
      display: flex;
      gap: 6px;
    }

    .btn-move,
    .btn-remove {
      background: none;
      border: 1px solid var(--beige-dark);
      color: var(--dark-light);
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-move:hover {
      background: var(--beige);
      color: var(--dark);
    }

    .btn-remove:hover {
      background: #ffeaea;
      color: var(--red);
      border-color: var(--red-light);
    }

    .list-item .form-group {
      margin-bottom: 10px;
    }

    .list-item .form-group:last-child {
      margin-bottom: 0;
    }

    /* String list (simple list of strings) */
    .string-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .string-list-item .form-input {
      flex: 1;
    }

    .string-list-item .btn-remove {
      flex-shrink: 0;
    }

    /* Nested list (e.g. cards inside sections) */
    .nested-list {
      margin-top: 10px;
      border: 1px dashed var(--beige-dark);
      border-radius: 6px;
      padding: 12px;
      background: var(--beige);
    }

    .nested-list .list-item {
      background: var(--white);
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--beige-dark);
    }

    .nested-list .list-item:last-child {
      margin-bottom: 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
      z-index: 200;
      animation: slideUp 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .toast.success {
      background: var(--green);
    }

    .toast.error {
      background: var(--red);
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--dark-light);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--beige-dark);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Blog list */
    .blog-list {
      max-width: 860px;
      margin: 0 auto;
    }

    .blog-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .blog-list-title {
      font-size: 22px;
      font-weight: 600;
    }

    .blog-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--white);
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--beige-dark);
      cursor: pointer;
      transition: all 0.15s;
    }

    .blog-entry:hover {
      border-color: var(--sage-light);
      box-shadow: 0 2px 8px rgba(122,154,138,0.1);
    }

    .blog-entry-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .blog-entry-meta {
      font-size: 12px;
      color: var(--dark-light);
    }

    .blog-entry-arrow {
      color: var(--dark-light);
      font-size: 18px;
    }

    /* Delete confirm */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal h3 {
      margin-bottom: 12px;
      font-size: 18px;
    }

    .modal p {
      color: var(--dark-light);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Image upload */
    .image-field {
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      padding: 16px;
      background: var(--white);
    }

    .image-preview {
      margin-bottom: 12px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--beige);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }

    .image-preview-empty {
      color: var(--dark-light);
      font-size: 13px;
      padding: 24px;
    }

    .image-upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-upload-row .form-input {
      flex: 1;
      min-width: 200px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--sage);
      color: var(--white);
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-upload:hover {
      background: var(--sage-dark);
    }

    .btn-upload:disabled {
      background: var(--sage-light);
      cursor: not-allowed;
    }

    .image-upload-status {
      font-size: 12px;
      color: var(--dark-light);
      margin-top: 6px;
    }

    .image-upload-status.uploading {
      color: var(--sage);
    }

    .image-upload-status.error {
      color: var(--red);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .btn-menu-toggle {
        display: block;
      }

      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        top: var(--header-height);
        background: rgba(0,0,0,0.3);
        z-index: 85;
        display: none;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        margin-left: 0;
        padding: 20px;
      }

      .editor-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-menu-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
    <span class="header-title">Runayoga Admin</span>
  </div>
  <div class="header-actions" id="headerActions" style="display:none;">
    <span class="header-user" id="headerUser"></span>
    <button class="btn-publish" id="btnPublish" onclick="publishSite()">&#9650; Ver&ouml;ffentlichen</button>
    <button class="btn-logout" onclick="logout()">Abmelden</button>
  </div>
</div>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div id="sidebarContent">
    <div class="loading"><div class="spinner"></div>Laden...</div>
  </div>
</nav>

<!-- Main content area -->
<div class="main" id="mainContent">
  <!-- Auth screen or content will be injected here -->
</div>

<script>
(function() {
  'use strict';

  const REPO = 'Zeo-ID/runayoga';
  const API_BASE = 'https://api.github.com';
  const BRANCH = 'main';

  // State
  let currentFile = null;
  let currentSha = null;
  let currentData = null;
  let currentBody = '';
  let currentFieldDefs = [];
  let currentDir = null;
  let contentTree = null;

  // Section config for sidebar
  const SECTION_CONFIG = {
    _root: { label: 'Allgemein', icon: '&#9881;', order: 0 },
    angebote: { label: 'Angebote', icon: '', order: 1 },
    blog: { label: 'Blog', icon: '&#9998;', order: 2 },
    pages: { label: 'Seiten', icon: '', order: 3 }
  };

  // Root file display names and icons
  const ROOT_FILE_CONFIG = {
    'site.md': { label: 'Seitenweite Daten', icon: '&#9881;' },
    'home.md': { label: 'Startseite', icon: '&#127968;' },
    'preise.md': { label: 'Preise &amp; Pakete', icon: '&#128176;' }
  };

  // Known field labels
  const FIELD_LABELS = {
    name: 'Name', email: 'E-Mail', phone: 'Telefon', address: 'Adresse',
    instagram: 'Instagram URL', whatsapp: 'WhatsApp Nummer',
    opening_hours: 'Oeffnungszeiten', day: 'Tag', hours: 'Zeiten',
    seo_title: 'SEO Titel', seo_description: 'SEO Beschreibung',
    hero_title: 'Hero Titel', hero_subtitle: 'Hero Untertitel',
    hero_cta_text: 'Hero Button Text', hero_cta_link: 'Hero Button Link',
    hero_cta_secondary_text: 'Hero Button 2 Text', hero_cta_secondary_link: 'Hero Button 2 Link',
    hero_image: 'Hero Bild', hero_image_alt: 'Hero Bild Alt-Text',
    philosophy_quote: 'Philosophie Zitat', philosophy_cite: 'Zitat Quelle',
    about_label: 'Ueber mich Label', about_title: 'Ueber mich Titel',
    about_text: 'Ueber mich Text', about_image: 'Ueber mich Bild',
    about_image_alt: 'Ueber mich Bild Alt-Text',
    services_label: 'Angebot Label', services_title: 'Angebot Titel',
    services_subtitle: 'Angebot Untertitel',
    retreat_label: 'Retreat Label', retreat_title: 'Retreat Titel',
    retreat_text: 'Retreat Text', retreat_image: 'Retreat Bild',
    retreat_image_alt: 'Retreat Bild Alt-Text', retreat_highlights: 'Retreat Highlights',
    testimonials_label: 'Testimonials Label', testimonials_title: 'Testimonials Titel',
    testimonials: 'Testimonials', cta_title: 'CTA Titel', cta_text: 'CTA Text',
    title: 'Titel', subtitle: 'Untertitel', slug: 'Slug',
    sort_order: 'Reihenfolge', highlights: 'Highlights',
    target_audience: 'Fuer wen geeignet', date: 'Datum', author: 'Autor',
    excerpt: 'Kurzbeschreibung', image: 'Bild',
    quote: 'Zitat', stars: 'Sterne (1-5)',
    sections: 'Preisgruppen', label: 'Label', description: 'Beschreibung',
    cards: 'Preiskarten', price: 'Preis', period: 'Zeitraum',
    features: 'Features', featured: 'Hervorgehoben'
  };

  // =====================
  // Auth
  // =====================

  function getToken() {
    return localStorage.getItem('github_token');
  }

  function isAuthenticated() {
    return !!getToken();
  }

  window.logout = function() {
    localStorage.removeItem('github_token');
    location.reload();
  };

  function showAuthScreen() {
    document.getElementById('headerActions').style.display = 'none';
    document.getElementById('sidebar').style.display = 'none';

  // =====================
  // GitHub API
  // =====================

  function ghFetch(path, options) {
    const token = getToken();
    const url = path.startsWith('http') ? path : API_BASE + path;
    return fetch(url, {
      ...options,
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        ...(options && options.headers || {})
      }
    });
  }

  async function fetchFile(path) {
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH);
    if (!res.ok) throw new Error('Datei konnte nicht geladen werden: ' + res.status);
    return res.json();
  }

  async function saveFile(path, content, sha, message) {
    const body = {
      message: message || 'Update ' + path.split('/').pop(),
      content: btoa(unescape(encodeURIComponent(content))),
      sha: sha,
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Speichern fehlgeschlagen');
    }
    return res.json();
  }

  async function createFile(path, content, message) {
    const body = {
      message: message || 'Create ' + path.split('/').pop(),
      content: btoa(unescape(encodeURIComponent(content))),
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Erstellen fehlgeschlagen');

  }

  async function deleteFile(path, sha, message) {
    const body = {
      message: message || 'Delete ' + path.split('/').pop(),
      sha: sha,
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Loeschen fehlgeschlagen');
    }
    return res.json();
  }

  // =====================
  // Content parsing
  // =====================

  function parseMarkdown(raw) {
    const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!match) return { frontmatter: {}, body: raw };
    let fm;
    try {
      fm = jsyaml.load(match[1]) || {};
    } catch(e) {
      fm = {};
    }
    return { frontmatter: fm, body: match[2] || '' };
  }

  function serializeMarkdown(frontmatter, body) {
    const yamlStr = jsyaml.dump(frontmatter, {
      lineWidth: -1,
      quotingType: '"',
      forceQuotes: false,
      noRefs: true,
      sortKeys: false
    });
    if (body && body.trim()) {
      return '---\n' + yamlStr + '---\n\n' + body.trimEnd() + '\n';
    }
    return '---\n' + yamlStr + '---\n';
  }

  // =====================
  // Field definitions (auto-inferred)
  // =====================

  function autoLabel(key) {
    if (FIELD_LABELS[key]) return FIELD_LABELS[key];
    return key.split('_').map(function(w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  function inferFieldType(key, value) {
    if (typeof value === 'boolean') return 'boolean';
    if (typeof value === 'number') return 'number';

    if (typeof value === 'string') {
      if (key === 'date' || /^\d{4}-\d{2}-\d{2}/.test(value)) return 'date';
      if (key.endsWith('_image') || key === 'image' || key === 'hero_image' || key === 'about_image' || key === 'retreat_image' || (value && /^\/images\//.test(value))) return 'image';
      if (key.endsWith('_text') || key.endsWith('_description') || key === 'excerpt' || key === 'philosophy_quote' || key === 'seo_description' || String(value).length > 80) return 'text';
      return 'string';
    }

    if (Array.isArray(value)) {
      if (value.length === 0) return 'string-list';
      if (typeof value[0] === 'object' && value[0] !== null) return 'object-list';
      return 'string-list';
    }

    return 'string';
  }

  function inferObjectFields(items) {
    if (!Array.isArray(items) || items.length === 0) return [];
    var sample = items[0];
    var fields = [];
    Object.keys(sample).forEach(function(k) {
      var ft = inferFieldType(k, sample[k]);
      var def = { key: k, label: autoLabel(k), type: ft };
      if (ft === 'object-list') {
        def.fields = inferObjectFields(sample[k]);
      }
      fields.push(def);
    });
    return fields;
  }

  function inferFieldDefs(frontmatter, body) {
    var defs = [];
    Object.keys(frontmatter).forEach(function(key) {
      var value = frontmatter[key];
      var ft = inferFieldType(key, value);
      var def = { key: key, label: autoLabel(key), type: ft };
      if (ft === 'object-list') {
        def.fields = inferObjectFields(value);
      }
      defs.push(def);
    });
    if (body && body.trim()) {
      defs.push({ key: '_body', label: 'Inhalt (Markdown)', type: 'body' });
    }
    return defs;
  }

  function showLoading() {

  function showToast(message, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    document.body.appendChild(toast);

  function setActiveSidebar(el) {
    document.querySelectorAll('.sidebar-item').forEach(function(item) {

    document.getElementById('sidebarOverlay').classList.toggle('open');

  // =====================
  // Load file
  // =====================

  window.loadFile = async function(el) {
    const path = el.dataset.path;
    setActiveSidebar(el);
    closeSidebar();
    showLoading();

    try {
      const file = await fetchFile(path);
      const raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
      const parsed = parseMarkdown(raw);

      currentFile = path;
      currentSha = file.sha;
      currentData = parsed.frontmatter;
      currentBody = parsed.body;
      currentFieldDefs = inferFieldDefs(parsed.frontmatter, parsed.body);
      currentDir = getFileDir(path);

      renderEditor(path, parsed.frontmatter, parsed.body);
    } catch(err) {
      document.getElementById('mainContent').innerHTML = `
        <div class="welcome">
          <h2>Fehler</h2>
          <p>${escHtml(err.message)}</p>
        </div>
      `;
    }
  };

  function getFileDir(path) {
    // src/content/blog/foo.md → blog, src/content/home.md → null
    var parts = path.replace('src/content/', '').split('/');
    return parts.length > 1 ? parts[0] : null;
  }

  function loadFileByPath(path) {
    const el = document.querySelector('.sidebar-item[data-path="' + path + '"]');
    if (el) {
      window.loadFile(el);
    } else {
      var dir = getFileDir(path);
      var listItem = document.querySelector('[data-action="dir-list"][data-dir="' + dir + '"]');
      setActiveSidebar(listItem);
      closeSidebar();
      showLoading();

      fetchFile(path).then(function(file) {
        var raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
        var parsed = parseMarkdown(raw);

        currentFile = path;
        currentSha = file.sha;
        currentData = parsed.frontmatter;
        currentBody = parsed.body;
        currentFieldDefs = inferFieldDefs(parsed.frontmatter, parsed.body);
        currentDir = dir;

        renderEditor(path, parsed.frontmatter, parsed.body);
      }).catch(function(err) {
        document.getElementById('mainContent').innerHTML = `
          <div class="welcome"><h2>Fehler</h2><p>${escHtml(err.message)}</p></div>
        `;
      });
    }
  }

  // =====================
  // Directory list (generic for any collection)
  // =====================

  window.loadDirectoryList = async function(dir) {
    var listItem = document.querySelector('[data-action="dir-list"][data-dir="' + dir + '"]');
    setActiveSidebar(listItem);
    closeSidebar();
    showLoading();

    try {
      const res = await ghFetch('/repos/' + REPO + '/contents/src/content/' + dir + '?ref=' + BRANCH);
      if (!res.ok) throw new Error('Verzeichnis konnte nicht geladen werden');
      var files = await res.json();

      files.sort(function(a, b) { return a.name.localeCompare(b.name); });

      var sectionLabel = (SECTION_CONFIG[dir] && SECTION_CONFIG[dir].label) || dir.charAt(0).toUpperCase() + dir.slice(1);

      let html = '<div class="blog-list">';
      html += '<div class="blog-list-header">';
      html += '<h2 class="blog-list-title">' + escHtml(sectionLabel) + '</h2>';
      html += '<button class="btn btn-primary" onclick="newItemInDirectory(\'' + escAttr(dir) + '\')">+ Neuer Eintrag</button>';
      html += '</div>';

      if (files.length === 0) {
        html += '<p style="color:var(--dark-light);text-align:center;padding:40px;">Noch keine Eintr&auml;ge vorhanden.</p>';
      }

      files.forEach(function(f) {
        if (!f.name.endsWith('.md')) return;
        const name = f.name.replace('.md', '');
        const displayName = fileDisplayName(name);
        html += `
          <div class="blog-entry" onclick="loadFileByPath('${escAttr(f.path)}')">
            <div class="blog-entry-info">
              <h3>${escHtml(displayName)}</h3>
              <span class="blog-entry-meta">${escHtml(f.path)}</span>
            </div>
            <span class="blog-entry-arrow">&rsaquo;</span>
          </div>
        `;
      });

      html += '</div>';
      document.getElementById('mainContent').innerHTML = html;
    } catch(err) {
      showToast(err.message, 'error');
    }
  };

  // Backwards-compatible aliases
  window.loadBlogList = function() { window.loadDirectoryList('blog'); };

  window.loadFileByPath = loadFileByPath;

  window.newItemInDirectory = async function(dir) {
    closeSidebar();
    currentFile = null;
    currentSha = null;
    currentDir = dir;

    // Try to get template from first file in directory
    try {
      var treeDirFiles = contentTree ? contentTree.filter(function(f) {
        return f.startsWith(dir + '/') && f.endsWith('.md');
      }) : [];

      if (treeDirFiles.length > 0) {
        var templatePath = 'src/content/' + treeDirFiles[0];
        var file = await fetchFile(templatePath);
        var raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
        var parsed = parseMarkdown(raw);

        // Create empty template based on existing structure
        currentData = {};
        Object.keys(parsed.frontmatter).forEach(function(key) {
          var val = parsed.frontmatter[key];
          if (typeof val === 'boolean') currentData[key] = false;
          else if (typeof val === 'number') currentData[key] = 0;
          else if (Array.isArray(val)) currentData[key] = [];
          else if (key === 'date') currentData[key] = new Date().toISOString().split('T')[0];
          else currentData[key] = '';
        });
        currentBody = '';
        if (parsed.body && parsed.body.trim()) currentBody = '';
      } else {
        currentData = { title: '', slug: '' };
        currentBody = '';
      }
    } catch(e) {
      currentData = { title: '', slug: '' };
      currentBody = '';
    }

    currentFieldDefs = inferFieldDefs(currentData, currentBody || ' ');
    renderEditor(null, currentData, currentBody, true);
  };

  // Keep newBlogPost for backwards compatibility
  window.newBlogPost = function() { window.newItemInDirectory('blog'); };

  // =====================
  // Render editor
  // =====================

  function renderEditor(path, frontmatter, body, isNew) {
    const fields = currentFieldDefs;
    var sectionLabel = currentDir ? ((SECTION_CONFIG[currentDir] && SECTION_CONFIG[currentDir].label) || currentDir.charAt(0).toUpperCase() + currentDir.slice(1)) : '';
    const title = isNew ? ('Neuer Eintrag' + (sectionLabel ? ' (' + sectionLabel + ')' : '')) : getLabel(path);

    let html = '<div class="editor">';
    html += '<div class="editor-header">';
    html += '<div>';
    html += '<h2 class="editor-title">' + escHtml(title) + '</h2>';
    if (path) html += '<span class="editor-path">' + escHtml(path) + '</span>';
    html += '</div>';
    html += '<div class="editor-actions">';
    // Show delete button for collection items (files in subdirectories), not root singletons
    if (!isNew && currentDir) {
      html += '<button class="btn btn-danger" onclick="deleteCollectionItem()">L&ouml;schen</button>';
    }
    html += '<button class="btn btn-primary" id="btnSave" onclick="saveCurrentFile()">Speichern</button>';
    html += '</div>';
    html += '</div>';

    html += '<form id="editorForm" onsubmit="return false;">';

    fields.forEach(function(field) {
      html += renderField(field, frontmatter, body);
    });

    html += '</form>';
    html += '</div>';

    document.getElementById('mainContent').innerHTML = html;
  }

  function renderField(field, data, body, prefix) {
    const pfx = prefix || '';
    const fieldId = pfx + field.key;
    let value;

    if (field.key === '_body') {
      value = body || '';
    } else {
      value = getNestedValue(data, field.key);
    }

    let html = '';

    switch(field.type) {
      case 'string':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="text" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(value || '') + '" />';
        html += '</div>';
        break;

      case 'text':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<textarea class="form-textarea" id="' + fieldId + '" name="' + fieldId + '">' + escHtml(value || '') + '</textarea>';
        html += '</div>';
        break;

      case 'number':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="number" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(value != null ? value : '') + '" />';
        html += '</div>';
        break;

      case 'date':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="date" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(formatDate(value)) + '" />';
        html += '</div>';
        break;

      case 'boolean':
        html += '<div class="form-group">';
        html += '<div class="form-checkbox-wrap">';
        html += '<input class="form-checkbox" type="checkbox" id="' + fieldId + '" name="' + fieldId + '"' + (value ? ' checked' : '') + ' />';
        html += '<label class="form-checkbox-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '</div>';
        html += '</div>';
        break;

      case 'body':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<textarea class="form-textarea body-editor" id="' + fieldId + '" name="' + fieldId + '">' + escHtml(value || '') + '</textarea>';
        html += '</div>';
        break;

      case 'image':
        var imgPath = value || '';
        var imgSrc = imgPath ? imgPath : '';
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(field.label) + '</label>';
        html += '<div class="image-field">';
        html += '<div class="image-preview" id="preview_' + fieldId + '">';
        if (imgSrc) {
          html += '<img src="' + escAttr(imgSrc) + '" alt="Vorschau" />';
        } else {
          html += '<span class="image-preview-empty">Kein Bild ausgewaehlt</span>';
        }
        html += '</div>';
        html += '<div class="image-upload-row">';
        html += '<input class="form-input" type="text" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(imgPath) + '" placeholder="/images/beispiel.jpg" />';
        html += '<input type="file" id="file_' + fieldId + '" accept="image/*" style="display:none" onchange="handleImageUpload(\'' + fieldId + '\', this)" />';
        html += '<button type="button" class="btn-upload" onclick="document.getElementById(\'file_' + fieldId + '\').click()">&#128247; Hochladen</button>';
        html += '</div>';
        html += '<div class="image-upload-status" id="status_' + fieldId + '"></div>';
        html += '</div>';
        html += '</div>';
        break;

      case 'string-list':
        var items = Array.isArray(value) ? value : [];
        html += '<div class="form-group">';
        html += '<div class="list-field">';
        html += '<div class="list-field-header">';
        html += '<span class="list-field-title">' + escHtml(field.label) + '</span>';
        html += '<div style="display:flex;align-items:center;gap:8px;">';
        html += '<span class="list-field-count">' + items.length + '</span>';
        html += '<button type="button" class="btn-add" onclick="addStringListItem(\'' + fieldId + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
        html += '<div id="list_' + fieldId + '" style="padding:12px 16px;">';
        items.forEach(function(item, i) {
          html += renderStringListItem(fieldId, i, item);
        });
        html += '</div>';
        html += '</div>';
        html += '</div>';
        break;

      case 'object-list':
        var objItems = Array.isArray(value) ? value : [];
        html += '<div class="form-group">';
        html += '<div class="list-field">';
        html += '<div class="list-field-header">';
        html += '<span class="list-field-title">' + escHtml(field.label) + '</span>';
        html += '<div style="display:flex;align-items:center;gap:8px;">';
        html += '<span class="list-field-count" id="count_' + fieldId + '">' + objItems.length + '</span>';
        html += '<button type="button" class="btn-add" onclick="addObjectListItem(\'' + fieldId + '\', \'' + escAttr(JSON.stringify(field.fields)) + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
        html += '<div id="list_' + fieldId + '">';
        objItems.forEach(function(item, i) {
          html += renderObjectListItem(fieldId, i, item, field.fields);
        });
        html += '</div>';
        html += '</div>';
        html += '</div>';
        break;
    }

    return html;
  }

  function renderStringListItem(fieldId, index, value) {
    return '<div class="string-list-item" data-list="' + fieldId + '" data-index="' + index + '">' +
      '<input class="form-input" type="text" name="' + fieldId + '_' + index + '" value="' + escAttr(value || '') + '" />' +
      '<button type="button" class="btn-remove" onclick="removeStringListItem(this)" title="Entfernen">&times;</button>' +
      '</div>';
  }

  function renderObjectListItem(fieldId, index, item, subFields) {
    let html = '<div class="list-item" data-list="' + fieldId + '" data-index="' + index + '">';
    html += '<div class="list-item-header">';
    html += '<span class="list-item-number">#' + (index + 1) + '</span>';
    html += '<div class="list-item-actions">';
    html += '<button type="button" class="btn-move" onclick="moveListItem(this, -1)" title="Nach oben">&uarr;</button>';
    html += '<button type="button" class="btn-move" onclick="moveListItem(this, 1)" title="Nach unten">&darr;</button>';
    html += '<button type="button" class="btn-remove" onclick="removeObjectListItem(this)" title="Entfernen">&times;</button>';
    html += '</div>';
    html += '</div>';

    subFields.forEach(function(sf) {
      var subId = fieldId + '_' + index + '_' + sf.key;
      var subValue = item ? item[sf.key] : '';

      if (sf.type === 'string-list') {
        var subItems = Array.isArray(subValue) ? subValue : [];
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(sf.label) + '</label>';
        html += '<div class="nested-list" id="list_' + subId + '">';
        subItems.forEach(function(si, j) {
          html += '<div class="string-list-item" data-list="' + subId + '" data-index="' + j + '">' +
            '<input class="form-input" type="text" name="' + subId + '_' + j + '" value="' + escAttr(si || '') + '" />' +
            '<button type="button" class="btn-remove" onclick="removeStringListItem(this)" title="Entfernen">&times;</button>' +
            '</div>';
        });
        html += '<button type="button" class="btn-add" style="margin-top:6px;" onclick="addStringListItem(\'' + subId + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
      } else if (sf.type === 'object-list') {
        var nestedItems = Array.isArray(subValue) ? subValue : [];
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(sf.label) + '</label>';
        html += '<div class="nested-list" id="list_' + subId + '">';
        nestedItems.forEach(function(ni, j) {
          html += renderObjectListItem(subId, j, ni, sf.fields);
        });
        html += '<button type="button" class="btn-add" style="margin-top:6px;" onclick="addObjectListItem(\'' + subId + '\', \'' + escAttr(JSON.stringify(sf.fields)) + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
      } else if (sf.type === 'text') {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<textarea class="form-textarea" id="' + subId + '" name="' + subId + '">' + escHtml(subValue || '') + '</textarea>';
        html += '</div>';
      } else if (sf.type === 'number') {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<input class="form-input" type="number" id="' + subId + '" name="' + subId + '" value="' + escAttr(subValue != null ? subValue : '') + '" />';
        html += '</div>';
      } else if (sf.type === 'boolean') {
        html += '<div class="form-group">';
        html += '<div class="form-checkbox-wrap">';
        html += '<input class="form-checkbox" type="checkbox" id="' + subId + '" name="' + subId + '"' + (subValue ? ' checked' : '') + ' />';
        html += '<label class="form-checkbox-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '</div>';
        html += '</div>';
      } else {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<input class="form-input" type="text" id="' + subId + '" name="' + subId + '" value="' + escAttr(subValue || '') + '" />';
        html += '</div>';
      }
    });

    html += '</div>';
    return html;
  }

  // =====================
  // List manipulation
  // =====================

  window.addStringListItem = function(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll('.string-list-item');
    const index = items.length;
    const div = document.createElement('div');
    div.innerHTML = renderStringListItem(fieldId, index, '');
    // Append the actual child, not the wrapper div
    const newItem = div.firstElementChild;
    // Insert before the add button if it's a nested list
    const addBtn = container.querySelector(':scope > .btn-add');
    if (addBtn) {
      container.insertBefore(newItem, addBtn);
    } else {
      container.appendChild(newItem);
    }
    // Update count
    updateListCount(fieldId);
  };

  window.removeStringListItem = function(btn) {
    const item = btn.closest('.string-list-item');
    const fieldId = item.dataset.list;
    item.remove();
    reindexStringList(fieldId);
    updateListCount(fieldId);
  };

  window.addObjectListItem = function(fieldId, fieldsJson) {
    const fields = JSON.parse(fieldsJson);
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    const index = items.length;
    const emptyItem = {};
    fields.forEach(function(f) {
      if (f.type === 'string-list' || f.type === 'object-list') {
        emptyItem[f.key] = [];
      } else if (f.type === 'boolean') {
        emptyItem[f.key] = false;
      } else if (f.type === 'number') {
        emptyItem[f.key] = 0;
      } else {
        emptyItem[f.key] = '';
      }
    });
    const div = document.createElement('div');
    div.innerHTML = renderObjectListItem(fieldId, index, emptyItem, fields);
    const newItem = div.firstElementChild;
    // Insert before the add button if it's a nested list
    const addBtn = container.querySelector(':scope > .btn-add');
    if (addBtn) {
      container.insertBefore(newItem, addBtn);
    } else {
      container.appendChild(newItem);
    }
    updateListCount(fieldId);
  };

  window.removeObjectListItem = function(btn) {
    const item = btn.closest('.list-item');
    const fieldId = item.dataset.list;
    item.remove();
    reindexObjectList(fieldId);
    updateListCount(fieldId);
  };

  window.moveListItem = function(btn, direction) {
    const item = btn.closest('.list-item');
    const container = item.parentNode;
    const items = Array.from(container.querySelectorAll(':scope > .list-item'));
    const idx = items.indexOf(item);
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= items.length) return;

    if (direction === -1) {
      container.insertBefore(item, items[newIdx]);
    } else {
      container.insertBefore(item, items[newIdx].nextSibling);
    }
    reindexObjectList(item.dataset.list);
  };

  function reindexStringList(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll('.string-list-item');
    items.forEach(function(item, i) {
      item.dataset.index = i;
      const input = item.querySelector('input');
      if (input) input.name = fieldId + '_' + i;
    });
  }

  function reindexObjectList(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    items.forEach(function(item, i) {
      item.dataset.index = i;
      const num = item.querySelector('.list-item-number');
      if (num) num.textContent = '#' + (i + 1);
    });
  }

  function updateListCount(fieldId) {
    const countEl = document.getElementById('count_' + fieldId);
    if (!countEl) return;
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    countEl.textContent = items.length;
  }

  // =====================
  // Image upload
  // =====================

  // Compress image via Canvas (max 1600px, JPEG 0.82)
  function compressImage(file, maxWidth, maxHeight, quality) {
    maxWidth = maxWidth || 1600;
    maxHeight = maxHeight || 1200;
    quality = quality || 0.82;
    return new Promise(function(resolve, reject) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxWidth || h > maxHeight) {
          var ratio = Math.min(maxWidth / w, maxHeight / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        var b64 = dataUrl.split(',')[1];
        var sizeKB = Math.round(b64.length * 3 / 4 / 1024);
        resolve({ base64: b64, ext: 'jpg', sizeKB: sizeKB, width: w, height: h });
      };
      img.onerror = function() { reject(new Error('Bild konnte nicht geladen werden')); };
      img.src = URL.createObjectURL(file);
    });
  }

  window.handleImageUpload = async function(fieldId, fileInput) {
    const file = fileInput.files[0];
    if (!file) return;

    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Bitte nur Bilddateien hochladen', 'error');
      return;
    }

    // Validate file size (max 10MB before compression)
    if (file.size > 10 * 1024 * 1024) {
      showToast('Bild zu gross (max. 10 MB)', 'error');
      return;
    }

    const statusEl = document.getElementById('status_' + fieldId);

    statusEl.textContent = 'Wird komprimiert...';
    statusEl.className = 'image-upload-status uploading';

    try {
      // Compress image
      var compressed = await compressImage(file, 1600, 1200, 0.82);
      var base64 = compressed.base64;

      statusEl.textContent = 'Wird hochgeladen (' + compressed.sizeKB + ' KB, ' + compressed.width + 'x' + compressed.height + ')...';

      // Clean filename (always .jpg after compression)
      const baseName = file.name.replace(/\.[^.]+$/, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '');
      const fileName = baseName + '.jpg';
      const ghPath = 'public/images/' + fileName;

      // Check if file already exists
      let existingSha = null;
      try {
        const checkRes = await ghFetch('/repos/' + REPO + '/contents/' + ghPath + '?ref=' + BRANCH);
        if (checkRes.ok) {
          const existing = await checkRes.json();
          existingSha = existing.sha;
        }
      } catch(e) { /* File doesn't exist, that's fine */ }

      // Upload to GitHub
      const uploadBody = {
        message: 'Upload Bild: ' + fileName,
        content: base64,
        branch: BRANCH
      };
      if (existingSha) {
        uploadBody.sha = existingSha;
      }

      const uploadRes = await ghFetch('/repos/' + REPO + '/contents/' + ghPath, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(uploadBody)
      });

      if (!uploadRes.ok) {
        const err = await uploadRes.json();
        throw new Error(err.message || 'Upload fehlgeschlagen');
      }

      // Update the text field with the path
      const imgPath = '/images/' + fileName;
      document.getElementById(fieldId).value = imgPath;

      // Update preview with data URL (instant, no deploy needed)
      const previewEl = document.getElementById('preview_' + fieldId);
      previewEl.innerHTML = '<img src="data:image/jpeg;base64,' + base64 + '" alt="Vorschau" />';

      statusEl.textContent = 'Hochgeladen: ' + fileName + ' (' + compressed.sizeKB + ' KB)';
      statusEl.className = 'image-upload-status';
      showToast('Bild hochgeladen! (' + compressed.sizeKB + ' KB)', 'success');
    } catch(err) {
      statusEl.textContent = 'Fehler: ' + err.message;
      statusEl.className = 'image-upload-status error';
      showToast('Upload fehlgeschlagen: ' + err.message, 'error');
    }
  };

  // =====================
  // Collect form data
  // =====================

  function collectFormData() {
    const fields = currentFieldDefs;
    const fm = {};
    let body = '';

    fields.forEach(function(field) {
      if (field.key === '_body') {
        const el = document.getElementById(field.key);
        body = el ? el.value : '';
      } else if (field.type === 'string-list') {
        fm[field.key] = collectStringList(field.key);
      } else if (field.type === 'object-list') {
        fm[field.key] = collectObjectList(field.key, field.fields);
      } else if (field.type === 'image') {
        const el = document.getElementById(field.key);
        fm[field.key] = el ? el.value : '';
      } else if (field.type === 'boolean') {
        const el = document.getElementById(field.key);
        fm[field.key] = el ? el.checked : false;
      } else if (field.type === 'number') {
        const el = document.getElementById(field.key);
        fm[field.key] = el && el.value !== '' ? parseInt(el.value, 10) : 0;
      } else if (field.type === 'date') {
        const el = document.getElementById(field.key);
        fm[field.key] = el ? el.value : '';
      } else {
        const el = document.getElementById(field.key);
        fm[field.key] = el ? el.value : '';
      }
    });

    // Preserve any frontmatter keys not in field definitions
    if (currentData) {
      Object.keys(currentData).forEach(function(key) {
        if (!(key in fm)) {
          fm[key] = currentData[key];
        }
      });
    }

    return { frontmatter: fm, body: body };
  }

  function collectStringList(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return [];
    const items = container.querySelectorAll('.string-list-item input');
    const result = [];
    items.forEach(function(input) {
      if (input.value.trim()) result.push(input.value);
    });
    return result;
  }

  function collectObjectList(fieldId, subFields) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return [];
    const items = container.querySelectorAll(':scope > .list-item');
    const result = [];

    items.forEach(function(item, i) {
      const obj = {};
      subFields.forEach(function(sf) {
        const subId = fieldId + '_' + i + '_' + sf.key;
        if (sf.type === 'string-list') {
          obj[sf.key] = collectStringList(subId);
        } else if (sf.type === 'object-list') {
          obj[sf.key] = collectObjectList(subId, sf.fields);
        } else if (sf.type === 'boolean') {
          const el = document.getElementById(subId);
          obj[sf.key] = el ? el.checked : false;
        } else if (sf.type === 'number') {
          const el = document.getElementById(subId);
          obj[sf.key] = el && el.value !== '' ? parseInt(el.value, 10) : 0;
        } else if (sf.type === 'text') {
          const el = document.getElementById(subId);
          obj[sf.key] = el ? el.value : '';
        } else {
          const el = document.getElementById(subId);
          obj[sf.key] = el ? el.value : '';
        }
      });
      result.push(obj);
    });

    return result;
  }

  // =====================
  // Save
  // =====================

  window.saveCurrentFile = async function() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = 'Speichern...';

    try {
      const data = collectFormData();
      const content = serializeMarkdown(data.frontmatter, data.body);

      if (!currentFile) {
        // New item in collection
        let slug = data.frontmatter.slug;
        if (!slug) {
          slug = slugify(data.frontmatter.title || 'neuer-eintrag');
          data.frontmatter.slug = slug;
        }
        var dir = currentDir || 'blog';
        const path = 'src/content/' + dir + '/' + slug + '.md';
        const finalContent = serializeMarkdown(data.frontmatter, data.body);
        const sectionLabel = (SECTION_CONFIG[dir] && SECTION_CONFIG[dir].label) || dir;
        const result = await createFile(path, finalContent, 'Neuer Eintrag (' + sectionLabel + '): ' + (data.frontmatter.title || slug));
        currentFile = path;
        currentSha = result.content.sha;
        currentData = data.frontmatter;
        currentBody = data.body;
        // Refresh tree cache
        contentTree = null;
        showToast('Eintrag erstellt!', 'success');
      } else {
        const result = await saveFile(currentFile, content, currentSha, 'Update ' + currentFile.split('/').pop());
        currentSha = result.content.sha;
        currentData = data.frontmatter;
        currentBody = data.body;
        showToast('Gespeichert!', 'success');
      }
    } catch(err) {
      showToast('Fehler: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Speichern';
    }
  };

  window.publishSite = async function() {
    const btn = document.getElementById('btnPublish');
    btn.disabled = true;
    btn.innerHTML = '&#8987; Wird gebaut...';

    try {
      const res = await fetch('/api/deploy', { method: 'POST' });
      const data = await res.json();
      if (data.triggered) {
        showToast('Seite wird neu gebaut — in 1-2 Min live!', 'success');
      } else {
        const detail = data.error || (data.errors && data.errors.length ? data.errors[0].message : '') || 'Status: ' + (data.status || '?');
        throw new Error('Deploy fehlgeschlagen: ' + detail);
      }
    } catch(err) {
      showToast('Fehler: ' + err.message, 'error');
    } finally {
      setTimeout(function() {
        btn.disabled = false;
        btn.innerHTML = '&#9650; Ver&ouml;ffentlichen';
      }, 10000);
    }
  };

  // =====================
  // Helpers
  // =====================

  function escHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    if (str == null) return '';
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function getNestedValue(obj, key) {
    if (!obj) return undefined;
    return obj[key];
  }

  function formatDate(val) {
    if (!val) return '';
    if (val instanceof Date) {
      return val.toISOString().split('T')[0];
    }
    const str = String(val);
    // Handle ISO dates
    if (str.length >= 10) {
      return str.substring(0, 10);
    }
    return str;
  }

  function slugify(str) {
    return str
      .toLowerCase()
      .replace(/[aeoeue]/g, function(m) { return {ae:'ae',oe:'oe',ue:'ue'}[m] || m; })
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '')
      .substring(0, 80);
  }

  function getLabel(path) {
    if (!path) return '';
    const name = path.split('/').pop().replace('.md', '');
    // Check root file config first
    var rootConf = ROOT_FILE_CONFIG[name + '.md'];
    if (rootConf) return rootConf.label.replace(/&amp;/g, '&');
    return fileDisplayName(name);
  }

  function fileDisplayName(name) {
    // "ueber-mich" → "Ueber Mich", "yoga-im-alltag" → "Yoga Im Alltag"
    return name.split('-').map(function(w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  // =====================
  // Dynamic sidebar
  // =====================

  async function fetchContentTree() {
    if (contentTree) return contentTree;

    var res = await ghFetch('/repos/' + REPO + '/git/trees/' + BRANCH + '?recursive=1');
    if (!res.ok) throw new Error('Tree konnte nicht geladen werden');
    var data = await res.json();

    // Filter to src/content/**/*.md
    var files = [];
    data.tree.forEach(function(item) {
      if (item.type === 'blob' && item.path.startsWith('src/content/') && item.path.endsWith('.md')) {
        files.push(item.path.replace('src/content/', ''));
      }
    });

    contentTree = files;
    return files;
  }

  async function buildSidebar() {
    var sidebarEl = document.getElementById('sidebarContent');
    try {
      var files = await fetchContentTree();

      // Group: root files vs directory files
      var rootFiles = [];
      var dirs = {};
      files.forEach(function(f) {
        var parts = f.split('/');
        if (parts.length === 1) {
          rootFiles.push(f);
        } else {
          var dir = parts[0];
          if (!dirs[dir]) dirs[dir] = [];
          dirs[dir].push(f);
        }
      });

      var html = '';

      // Root files → "Allgemein" section
      if (rootFiles.length > 0) {
        html += '<div class="sidebar-section">';
        html += '<div class="sidebar-section-title">Allgemein</div>';
        rootFiles.forEach(function(f) {
          var conf = ROOT_FILE_CONFIG[f] || {};
          var label = conf.label || fileDisplayName(f.replace('.md', ''));
          var icon = conf.icon || '';
          html += '<div class="sidebar-item" data-path="src/content/' + escAttr(f) + '" onclick="loadFile(this)">';
          if (icon) html += '<span class="icon">' + icon + '</span> ';
          html += label;
          html += '</div>';
        });
        html += '</div>';
      }

      // Sort directories by config order, then alphabetically
      var dirNames = Object.keys(dirs).sort(function(a, b) {
        var oa = SECTION_CONFIG[a] ? SECTION_CONFIG[a].order : 99;
        var ob = SECTION_CONFIG[b] ? SECTION_CONFIG[b].order : 99;
        if (oa !== ob) return oa - ob;
        return a.localeCompare(b);
      });

      dirNames.forEach(function(dir) {
        var conf = SECTION_CONFIG[dir] || {};
        var label = conf.label || dir.charAt(0).toUpperCase() + dir.slice(1);
        var icon = conf.icon || '';

        html += '<div class="sidebar-section">';
        html += '<div class="sidebar-section-title">' + escHtml(label) + '</div>';

        // "Alle anzeigen" link for collections
        html += '<div class="sidebar-item" data-action="dir-list" data-dir="' + escAttr(dir) + '" onclick="loadDirectoryList(\'' + escAttr(dir) + '\')">';
        if (icon) html += '<span class="icon">' + icon + '</span> ';
        html += 'Alle ' + escHtml(label);
        html += '</div>';

        // Individual items
        dirs[dir].sort(function(a, b) { return a.localeCompare(b); });
        dirs[dir].forEach(function(f) {
          var name = f.split('/').pop().replace('.md', '');
          html += '<div class="sidebar-item sub" data-path="src/content/' + escAttr(f) + '" onclick="loadFile(this)">';
          html += escHtml(fileDisplayName(name));
          html += '</div>';
        });

        // "Neuer Eintrag" button
        html += '<button class="sidebar-btn-new" onclick="newItemInDirectory(\'' + escAttr(dir) + '\')">+ Neuer Eintrag</button>';

        html += '</div>';
      });

      sidebarEl.innerHTML = html;
    } catch(err) {
      sidebarEl.innerHTML = '<div style="padding:20px;color:var(--red);font-size:13px;">Sidebar konnte nicht geladen werden: ' + escHtml(err.message) + '</div>';
    }
  }

  // =====================
  // Init
  // =====================

  function init() {
    if (!isAuthenticated()) {
      showAuthScreen();
      return;
    }

    document.getElementById('sidebar').style.display = '';
    loadUser();
    buildSidebar();
    showWelcome();
  }

  init();

})();
