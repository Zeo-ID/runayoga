<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Runayoga</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="/admin/js-yaml.min.js"></script>
  <script src="/admin/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #7a9a8a;
      --sage-light: #a3c4b4;
      --sage-dark: #5a7a6a;
      --beige: #f5f0e8;
      --beige-dark: #e8e0d4;
      --dark: #2d3436;
      --dark-light: #636e72;
      --white: #ffffff;
      --red: #d63031;
      --red-light: #fab1a0;
      --green: #00b894;
      --green-light: #dfe6e9;
      --sidebar-width: 280px;
      --header-height: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--beige);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--sage-dark);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-user {
      font-size: 13px;
      opacity: 0.9;
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .btn-logout:hover {
      background: rgba(255,255,255,0.25);
    }

    .btn-publish {
      background: #e17055;
      border: none;
      color: var(--white);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-publish:hover {
      background: #d35400;
    }

    .btn-publish:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }

    .btn-menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: var(--white);
      border-right: 1px solid var(--beige-dark);
      overflow-y: auto;
      z-index: 90;
      transition: transform 0.3s ease;
    }

    .sidebar-section {
      padding: 16px 0 4px 0;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--dark-light);
      padding: 0 20px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--dark);
      border-left: 3px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
    }

    .sidebar-item:hover {
      background: var(--beige);
    }

    .sidebar-item.active {
      background: var(--beige);
      border-left-color: var(--sage);
      color: var(--sage-dark);
      font-weight: 600;
    }

    .sidebar-item.sub {
      padding-left: 36px;
      font-size: 13px;
    }

    .sidebar-item .icon {
      margin-right: 10px;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .sidebar-btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 20px;
      padding: 8px 14px;
      background: var(--sage);
      color: var(--white);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .sidebar-btn-new:hover {
      background: var(--sage-dark);
    }

    /* Main content */
    .main {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
      padding: 32px;
    }

    /* Auth screen */
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height));
      text-align: center;
    }

    .auth-screen h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--dark);
    }

    .auth-screen p {
      color: var(--dark-light);
      margin-bottom: 24px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    .login-form input {
      padding: 12px 16px;
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-form input:focus {
      border-color: var(--sage);
    }

    .login-error {
      color: var(--red);
      font-size: 13px;
      min-height: 20px;
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--sage-dark);
      color: var(--white);
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      opacity: 0.85;
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Welcome screen */
    .welcome {
      max-width: 600px;
      margin: 60px auto;
      text-align: center;
    }

    .welcome h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--dark-light);
    }

    /* Editor */
    .editor {
      max-width: 860px;
      margin: 0 auto;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .editor-title {
      font-size: 22px;
      font-weight: 600;
    }

    .editor-path {
      font-size: 12px;
      color: var(--dark-light);
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--beige-dark);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--sage);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--sage-dark);
    }

    .btn-primary:disabled {
      background: var(--sage-light);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--white);
      color: var(--dark);
      border: 1px solid var(--beige-dark);
    }

    .btn-secondary:hover {
      background: var(--beige);
    }

    .btn-danger {
      background: var(--white);
      color: var(--red);
      border: 1px solid var(--red-light);
    }

    .btn-danger:hover {
      background: #ffeaea;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--dark);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--beige-dark);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: var(--white);
      color: var(--dark);
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,154,138,0.15);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-textarea.body-editor {
      min-height: 400px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
    }

    .form-checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--sage);
      cursor: pointer;
    }

    .form-checkbox-label {
      font-size: 14px;
      cursor: pointer;
    }

    /* List fields */
    .list-field {
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      background: var(--white);
      overflow: hidden;
    }

    .list-field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--beige);
      border-bottom: 1px solid var(--beige-dark);
    }

    .list-field-title {
      font-size: 13px;
      font-weight: 600;
    }

    .list-field-count {
      font-size: 12px;
      color: var(--dark-light);
      background: var(--white);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--sage);
      color: var(--white);
      border: none;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-add:hover {
      background: var(--sage-dark);
    }

    .list-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--beige);
      position: relative;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-item-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--dark-light);
      background: var(--beige);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .list-item-actions {
      display: flex;
      gap: 6px;
    }

    .btn-move,
    .btn-remove {
      background: none;
      border: 1px solid var(--beige-dark);
      color: var(--dark-light);
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-move:hover {
      background: var(--beige);
      color: var(--dark);
    }

    .btn-remove:hover {
      background: #ffeaea;
      color: var(--red);
      border-color: var(--red-light);
    }

    .list-item .form-group {
      margin-bottom: 10px;
    }

    .list-item .form-group:last-child {
      margin-bottom: 0;
    }

    /* String list (simple list of strings) */
    .string-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .string-list-item .form-input {
      flex: 1;
    }

    .string-list-item .btn-remove {
      flex-shrink: 0;
    }

    /* Nested list (e.g. cards inside sections) */
    .nested-list {
      margin-top: 10px;
      border: 1px dashed var(--beige-dark);
      border-radius: 6px;
      padding: 12px;
      background: var(--beige);
    }

    .nested-list .list-item {
      background: var(--white);
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--beige-dark);
    }

    .nested-list .list-item:last-child {
      margin-bottom: 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
      z-index: 200;
      animation: slideUp 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .toast.success {
      background: var(--green);
    }

    .toast.error {
      background: var(--red);
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--dark-light);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--beige-dark);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Blog list */
    .blog-list {
      max-width: 860px;
      margin: 0 auto;
    }

    .blog-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .blog-list-title {
      font-size: 22px;
      font-weight: 600;
    }

    .blog-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--white);
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid var(--beige-dark);
      cursor: pointer;
      transition: all 0.15s;
    }

    .blog-entry:hover {
      border-color: var(--sage-light);
      box-shadow: 0 2px 8px rgba(122,154,138,0.1);
    }

    .blog-entry-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .blog-entry-meta {
      font-size: 12px;
      color: var(--dark-light);
    }

    .blog-entry-arrow {
      color: var(--dark-light);
      font-size: 18px;
    }

    /* Delete confirm */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal h3 {
      margin-bottom: 12px;
      font-size: 18px;
    }

    .modal p {
      color: var(--dark-light);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Image upload */
    .image-field {
      border: 1px solid var(--beige-dark);
      border-radius: 8px;
      padding: 16px;
      background: var(--white);
    }

    .image-preview {
      margin-bottom: 12px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--beige);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }

    .image-preview-empty {
      color: var(--dark-light);
      font-size: 13px;
      padding: 24px;
    }

    .image-upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-upload-row .form-input {
      flex: 1;
      min-width: 200px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--sage);
      color: var(--white);
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-upload:hover {
      background: var(--sage-dark);
    }

    .btn-upload:disabled {
      background: var(--sage-light);
      cursor: not-allowed;
    }

    .image-upload-status {
      font-size: 12px;
      color: var(--dark-light);
      margin-top: 6px;
    }

    .image-upload-status.uploading {
      color: var(--sage);
    }

    .image-upload-status.error {
      color: var(--red);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .btn-menu-toggle {
        display: block;
      }

      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        top: var(--header-height);
        background: rgba(0,0,0,0.3);
        z-index: 85;
        display: none;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        margin-left: 0;
        padding: 20px;
      }

      .editor-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* MFA screens */
    .mfa-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-height));
      text-align: center;
      padding: 20px;
    }

    .mfa-screen h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .mfa-screen p {
      color: var(--dark-light);
      margin-bottom: 20px;
      max-width: 400px;
    }

    .mfa-code-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .mfa-code-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 2px solid var(--beige-dark);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .mfa-code-input:focus {
      border-color: var(--sage);
    }

    .qr-container {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: inline-block;
    }

    .recovery-codes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 320px;
      margin: 16px auto;
      text-align: left;
    }

    .recovery-code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      background: var(--beige);
      padding: 6px 12px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    .mfa-recovery-link {
      font-size: 13px;
      color: var(--sage);
      cursor: pointer;
      margin-top: 12px;
      text-decoration: underline;
    }

    /* Theme editor */
    .theme-editor {
      background: var(--white);
      border: 1px solid var(--beige-dark);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .theme-editor h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .theme-presets {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .theme-preset-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 2px solid var(--beige-dark);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: var(--white);
      transition: all 0.2s;
    }

    .theme-preset-btn:hover { border-color: var(--sage-light); }
    .theme-preset-btn.active { border-color: var(--sage); background: var(--beige); }

    .theme-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.1);
    }

    .color-pickers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .color-picker-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-picker-group label {
      font-size: 13px;
      font-weight: 500;
      min-width: 80px;
    }

    .color-picker-group input[type="color"] {
      width: 40px;
      height: 36px;
      border: 1px solid var(--beige-dark);
      border-radius: 6px;
      cursor: pointer;
      padding: 2px;
    }

    .color-picker-group input[type="text"] {
      width: 90px;
      padding: 6px 8px;
      border: 1px solid var(--beige-dark);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Site preview — scoped site typography */
    .site-preview {
      border: 1px solid var(--beige-dark);
      border-radius: 12px;
      overflow: hidden;
      background: #f5f0e8;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.7;

<script>
(function() {
  'use strict';

  const THEME_PRESETS = {

    ocean: { label: 'Ocean', primary: '#4a7c8e', primary_light: '#6a9cae', primary_dark: '#3a6c7e', accent: '#e8a87c', background: '#f0f4f5', text: '#2c3e50' },
    sunset: { label: 'Sunset', primary: '#b06846', primary_light: '#d08866', primary_dark: '#905836', accent: '#d4a574', background: '#faf5f0', text: '#3d2b1f' },
    lavender: { label: 'Lavender', primary: '#8b7a9e', primary_light: '#ab9abe', primary_dark: '#6b5a7e', accent: '#c49a6a', background: '#f5f0f8', text: '#2d2636' },
    earth: { label: 'Earth', primary: '#6b7355', primary_light: '#8b9375', primary_dark: '#4b5335', accent: '#a08060', background: '#f4f0e8', text: '#2d3426' }
  };

  // =====================
  // Auth
  // =====================

  function getToken() {
    return localStorage.getItem('github_token');
  }

  function isAuthenticated() {
    return !!getToken();
  }

  window.logout = function() {
    localStorage.removeItem('github_token');
    location.reload();
  };

  function showAuthScreen() {
    document.getElementById('headerActions').style.display = 'none';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('mainContent').innerHTML = `
      <div class="auth-screen">
        <h2>Runayoga Admin</h2>
        <p>Bitte Passwort eingeben, um Inhalte zu bearbeiten.</p>
        <form class="login-form" onsubmit="return handleLogin(event)">
          <input type="password" id="loginPassword" name="password" placeholder="Passwort" autocomplete="current-password" required />
          <div class="login-error" id="loginError"></div>
          <button type="submit" class="btn-login" id="loginBtn">Anmelden</button>
        </form>
      </div>
    `;
    document.getElementById('loginPassword').focus();
  }

  window.handleLogin = async function(e) {
    e.preventDefault();
    var pw = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginBtn');
    var errEl = document.getElementById('loginError');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Wird geprüft...';
    try {
      var res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      var data = await res.json();
      if (data.token) {
        localStorage.setItem('github_token', data.token);
        location.reload();
      } else if (data.mfa_setup_required) {
        showMfaSetup(data.setup_token);
      } else if (data.mfa_required) {
        showMfaVerify(data.session_token);
      } else {
        errEl.textContent = data.error || 'Anmeldung fehlgeschlagen';
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    } catch(err) {
      errEl.textContent = 'Verbindungsfehler';
      btn.disabled = false;
      btn.textContent = 'Anmelden';
    }
    return false;
  };

  // =====================
  // MFA Functions
  // =====================

  function showMfaSetup(setupToken) {
    window._mfaSetupToken = setupToken;
    document.getElementById('mainContent').innerHTML = `
      <div class="mfa-screen">
        <h2>Zwei-Faktor-Authentifizierung einrichten</h2>
        <p>Scanne den QR-Code mit deiner Authenticator-App (z.B. Google Authenticator, Authy).</p>
        <div class="qr-container" id="qrContainer">
          <div class="loading"><div class="spinner"></div>QR-Code wird geladen...</div>
        </div>
        <div class="mfa-code-inputs" id="mfaSetupInputs"></div>
        <button class="btn-login" id="mfaSetupBtn" disabled onclick="verifyMfaSetup()">Best&auml;tigen</button>
        <div class="login-error" id="mfaSetupError" style="margin-top:12px;"></div>
      </div>
    `;
    renderCodeInputs('mfaSetupInputs', 'mfaSetupBtn');
    // Generate QR code
    fetch('/api/mfa-setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'generate', setup_token: setupToken })
    }).then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.uri) {
          var container = document.getElementById('qrContainer');
          var qr = qrcode(0, 'M');
          qr.addData(data.uri);
          qr.make();
          container.innerHTML = qr.createImgTag(5, 8);
        } else {
          document.getElementById('mfaSetupError').textContent = data.error || 'QR-Code konnte nicht generiert werden';
        }
      }).catch(function() {
        document.getElementById('mfaSetupError').textContent = 'Verbindungsfehler';
      });
  }

  function showMfaVerify(sessionToken) {
    window._mfaSessionToken = sessionToken;
    document.getElementById('mainContent').innerHTML = `
      <div class="mfa-screen">
        <h2>Zwei-Faktor-Authentifizierung</h2>
        <p>Gib den 6-stelligen Code aus deiner Authenticator-App ein.</p>
        <div class="mfa-code-inputs" id="mfaVerifyInputs"></div>
        <button class="btn-login" id="mfaVerifyBtn" disabled onclick="verifyMfa()">Anmelden</button>
        <div class="login-error" id="mfaVerifyError" style="margin-top:12px;"></div>
        <div class="mfa-recovery-link" onclick="toggleRecoveryInput()">Recovery-Code verwenden</div>
        <div id="recoveryInputWrap" style="display:none;margin-top:16px;width:100%;max-width:320px;">
          <input class="form-input" type="text" id="recoveryCodeInput" placeholder="Recovery-Code (z.B. A1B2C3D4)" style="text-align:center;font-family:'SF Mono','Fira Code',monospace;letter-spacing:1px;" />
          <button class="btn-login" style="margin-top:10px;width:100%;" onclick="verifyMfa(true)">Mit Recovery-Code anmelden</button>
        </div>
      </div>
    `;
    renderCodeInputs('mfaVerifyInputs', 'mfaVerifyBtn');
  }

  function showRecoveryCodes(codes, token) {
    window._pendingToken = token;
    var codesHtml = '';
    codes.forEach(function(code) {
      codesHtml += '<div class="recovery-code">' + escHtml(code) + '</div>';
    });
    document.getElementById('mainContent').innerHTML = `
      <div class="mfa-screen">
        <h2>Recovery-Codes sichern</h2>
        <p>Speichere diese Codes an einem sicheren Ort. Jeder Code kann nur einmal verwendet werden, falls du den Zugang zu deiner Authenticator-App verlierst.</p>
        <div class="recovery-codes">
          ${codesHtml}
        </div>
        <button class="btn-login" onclick="finishMfaSetup()" style="margin-top:20px;">Verstanden, weiter</button>
      </div>
    `;
  }

  function renderCodeInputs(containerId, submitBtnId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var html = '';
    for (var i = 0; i < 6; i++) {
      html += '<input class="mfa-code-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="' + i + '" autocomplete="one-time-code" />';
    }
    container.innerHTML = html;
    var inputs = container.querySelectorAll('.mfa-code-input');
    inputs.forEach(function(input, idx) {
      input.addEventListener('input', function(e) {
        var val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        if (val && idx < 5) {
          inputs[idx + 1].focus();
        }
        // Enable/disable submit button
        var btn = document.getElementById(submitBtnId);
        if (btn) btn.disabled = getCodeFromInputs(containerId).length !== 6;
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          inputs[idx - 1].focus();
          inputs[idx - 1].value = '';
          var btn = document.getElementById(submitBtnId);
          if (btn) btn.disabled = true;
        }
        if (e.key === 'Enter') {
          var code = getCodeFromInputs(containerId);
          if (code.length === 6) {
            var btn = document.getElementById(submitBtnId);
            if (btn) btn.click();
          }
        }
      });
      input.addEventListener('paste', function(e) {
        e.preventDefault();
        var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
        for (var j = 0; j < 6 && j < paste.length; j++) {
          inputs[j].value = paste[j];
        }
        if (paste.length >= 6) {
          inputs[5].focus();
          var btn = document.getElementById(submitBtnId);
          if (btn) btn.disabled = false;
        } else if (paste.length > 0) {
          inputs[Math.min(paste.length, 5)].focus();
        }
      });
    });
    // Focus the first input
    if (inputs.length > 0) inputs[0].focus();
  }

  function getCodeFromInputs(containerId) {
    var container = document.getElementById(containerId);
    if (!container) return '';
    var inputs = container.querySelectorAll('.mfa-code-input');
    var code = '';
    inputs.forEach(function(input) { code += input.value; });
    return code;
  }

  window.verifyMfaSetup = async function() {
    var code = getCodeFromInputs('mfaSetupInputs');
    var btn = document.getElementById('mfaSetupBtn');
    var errEl = document.getElementById('mfaSetupError');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Wird geprüft...';
    try {
      var res = await fetch('/api/mfa-setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'verify', setup_token: window._mfaSetupToken, code: code })
      });
      var data = await res.json();
      if (data.token && data.recovery_codes) {
        showRecoveryCodes(data.recovery_codes, data.token);
      } else {
        errEl.textContent = data.error || 'Code ungültig';
        btn.disabled = false;
        btn.textContent = 'Bestätigen';
        // Clear inputs
        var inputs = document.querySelectorAll('#mfaSetupInputs .mfa-code-input');
        inputs.forEach(function(i) { i.value = ''; });
        if (inputs.length > 0) inputs[0].focus();
      }
    } catch(err) {
      errEl.textContent = 'Verbindungsfehler';
      btn.disabled = false;
      btn.textContent = 'Bestätigen';
    }
  };

  window.verifyMfa = async function(useRecovery) {
    var errEl = document.getElementById('mfaVerifyError');
    errEl.textContent = '';
    var body = { session_token: window._mfaSessionToken };
    if (useRecovery) {
      var recoveryCode = document.getElementById('recoveryCodeInput').value.trim();
      if (!recoveryCode) {
        errEl.textContent = 'Bitte Recovery-Code eingeben';
        return;
      }
      body.code = recoveryCode;
    } else {
      var code = getCodeFromInputs('mfaVerifyInputs');
      if (code.length !== 6) return;
      body.code = code;
      var btn = document.getElementById('mfaVerifyBtn');
      btn.disabled = true;
      btn.textContent = 'Wird geprüft...';
    }
    try {
      var res = await fetch('/api/mfa-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      if (data.token) {
        if (data.recovery_code_used) {
          showToast('Recovery-Code verwendet. Noch ' + data.remaining + ' übrig.', 'success');
        }
        localStorage.setItem('github_token', data.token);
        location.reload();
      } else {
        errEl.textContent = data.error || 'Code ungültig';
        if (!useRecovery) {
          var btn = document.getElementById('mfaVerifyBtn');
          btn.disabled = false;
          btn.textContent = 'Anmelden';
          var inputs = document.querySelectorAll('#mfaVerifyInputs .mfa-code-input');
          inputs.forEach(function(i) { i.value = ''; });
          if (inputs.length > 0) inputs[0].focus();
        }
      }
    } catch(err) {
      errEl.textContent = 'Verbindungsfehler';
      if (!useRecovery) {
        var btn = document.getElementById('mfaVerifyBtn');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    }
  };

  window.toggleRecoveryInput = function() {
    var wrap = document.getElementById('recoveryInputWrap');
    var codeInputs = document.getElementById('mfaVerifyInputs');
    var verifyBtn = document.getElementById('mfaVerifyBtn');
    if (wrap.style.display === 'none') {
      wrap.style.display = 'block';
      codeInputs.style.display = 'none';
      verifyBtn.style.display = 'none';
      document.getElementById('recoveryCodeInput').focus();
    } else {
      wrap.style.display = 'none';
      codeInputs.style.display = 'flex';
      verifyBtn.style.display = '';
      var inputs = codeInputs.querySelectorAll('.mfa-code-input');
      if (inputs.length > 0) inputs[0].focus();
    }
  };

  window.finishMfaSetup = function() {
    if (window._pendingToken) {
      localStorage.setItem('github_token', window._pendingToken);
      window._pendingToken = null;
      location.reload();
    }
  };

  async function loadUser() {
    document.getElementById('headerUser').textContent = 'Admin';
    document.getElementById('headerActions').style.display = 'flex';
  }

  // =====================
  // GitHub API
  // =====================

  function ghFetch(path, options) {
    const token = getToken();
    const url = path.startsWith('http') ? path : API_BASE + path;
    return fetch(url, {
      ...options,
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        ...(options && options.headers || {})
      }
    });
  }

  async function fetchFile(path) {
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH);
    if (!res.ok) throw new Error('Datei konnte nicht geladen werden: ' + res.status);
    return res.json();
  }

  async function saveFile(path, content, sha, message) {
    const body = {
      message: message || 'Update ' + path.split('/').pop(),
      content: btoa(unescape(encodeURIComponent(content))),
      sha: sha,
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Speichern fehlgeschlagen');
    }
    return res.json();
  }

  async function createFile(path, content, message) {
    const body = {
      message: message || 'Create ' + path.split('/').pop(),
      content: btoa(unescape(encodeURIComponent(content))),
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Erstellen fehlgeschlagen');
    }
    return res.json();
  }

  async function deleteFile(path, sha, message) {
    const body = {
      message: message || 'Delete ' + path.split('/').pop(),
      sha: sha,
      branch: BRANCH
    };
    const res = await ghFetch('/repos/' + REPO + '/contents/' + path, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Loeschen fehlgeschlagen');
    }
    return res.json();
  }

  // =====================
  // Content parsing
  // =====================

  function parseMarkdown(raw) {
    const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!match) return { frontmatter: {}, body: raw };
    let fm;
    try {
      fm = jsyaml.load(match[1]) || {};
    } catch(e) {
      fm = {};
    }
    return { frontmatter: fm, body: match[2] || '' };
  }

  function serializeMarkdown(frontmatter, body) {
    const yamlStr = jsyaml.dump(frontmatter, {
      lineWidth: -1,
      quotingType: '"',
      forceQuotes: false,
      noRefs: true,
      sortKeys: false
    });
    if (body && body.trim()) {
      return '---\n' + yamlStr + '---\n\n' + body.trimEnd() + '\n';
    }
    return '---\n' + yamlStr + '---\n';
  }

  // =====================
  // Field definitions (auto-inferred)
  // =====================

  function autoLabel(key) {
    if (FIELD_LABELS[key]) return FIELD_LABELS[key];
    return key.split('_').map(function(w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  function inferFieldType(key, value) {
    if (typeof value === 'boolean') return 'boolean';
    if (typeof value === 'number') return 'number';

    if (typeof value === 'string') {
      if (key === 'date' || /^\d{4}-\d{2}-\d{2}/.test(value)) return 'date';
      if (key.endsWith('_image') || key === 'image' || key === 'hero_image' || key === 'about_image' || key === 'retreat_image' || (value && /^\/images\//.test(value))) return 'image';
      if (key.endsWith('_text') || key.endsWith('_description') || key === 'excerpt' || key === 'philosophy_quote' || key === 'seo_description' || String(value).length > 80) return 'text';
      return 'string';
    }

    if (Array.isArray(value)) {
      if (value.length === 0) return 'string-list';
      if (typeof value[0] === 'object' && value[0] !== null) return 'object-list';
      return 'string-list';
    }

    return 'string';
  }

  function inferObjectFields(items) {
    if (!Array.isArray(items) || items.length === 0) return [];
    var sample = items[0];
    var fields = [];
    Object.keys(sample).forEach(function(k) {
      var ft = inferFieldType(k, sample[k]);
      var def = { key: k, label: autoLabel(k), type: ft };
      if (ft === 'object-list') {
        def.fields = inferObjectFields(sample[k]);
      }
      fields.push(def);
    });
    return fields;
  }

  function inferFieldDefs(frontmatter, body) {
    var defs = [];
    Object.keys(frontmatter).forEach(function(key) {
      var value = frontmatter[key];
      var ft = inferFieldType(key, value);
      var def = { key: key, label: autoLabel(key), type: ft };
      if (ft === 'object-list') {
        def.fields = inferObjectFields(value);
      }
      defs.push(def);
    });
    if (body && body.trim()) {
      defs.push({ key: '_body', label: 'Inhalt (Markdown)', type: 'body' });
    }
    return defs;
  }

  // =====================
  // Load file
  // =====================

  window.loadFile = async function(el) {
    const path = el.dataset.path;
    setActiveSidebar(el);
    closeSidebar();
    showLoading();

    try {
      const file = await fetchFile(path);
      const raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
      const parsed = parseMarkdown(raw);

      currentFile = path;
      currentSha = file.sha;
      currentData = parsed.frontmatter;
      currentBody = parsed.body;
      currentFieldDefs = inferFieldDefs(parsed.frontmatter, parsed.body);
      currentDir = getFileDir(path);

      renderEditor(path, parsed.frontmatter, parsed.body);
    } catch(err) {
      document.getElementById('mainContent').innerHTML = `
        <div class="welcome">
          <h2>Fehler</h2>
          <p>${escHtml(err.message)}</p>
        </div>
      `;
    }
  };

  function getFileDir(path) {
    // src/content/blog/foo.md → blog, src/content/home.md → null
    var parts = path.replace('src/content/', '').split('/');
    return parts.length > 1 ? parts[0] : null;
  }

  function loadFileByPath(path) {
    const el = document.querySelector('.sidebar-item[data-path="' + path + '"]');
    if (el) {
      window.loadFile(el);
    } else {
      var dir = getFileDir(path);
      var listItem = document.querySelector('[data-action="dir-list"][data-dir="' + dir + '"]');
      setActiveSidebar(listItem);
      closeSidebar();
      showLoading();

      fetchFile(path).then(function(file) {
        var raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
        var parsed = parseMarkdown(raw);

        currentFile = path;
        currentSha = file.sha;
        currentData = parsed.frontmatter;
        currentBody = parsed.body;
        currentFieldDefs = inferFieldDefs(parsed.frontmatter, parsed.body);
        currentDir = dir;

        renderEditor(path, parsed.frontmatter, parsed.body);
      }).catch(function(err) {
        document.getElementById('mainContent').innerHTML = `
          <div class="welcome"><h2>Fehler</h2><p>${escHtml(err.message)}</p></div>
        `;
      });
    }
  }

  // =====================
  // Directory list (generic for any collection)
  // =====================

  window.loadDirectoryList = async function(dir) {
    var listItem = document.querySelector('[data-action="dir-list"][data-dir="' + dir + '"]');
    setActiveSidebar(listItem);
    closeSidebar();
    showLoading();

    try {
      const res = await ghFetch('/repos/' + REPO + '/contents/src/content/' + dir + '?ref=' + BRANCH);
      if (!res.ok) throw new Error('Verzeichnis konnte nicht geladen werden');
      var files = await res.json();

      files.sort(function(a, b) { return a.name.localeCompare(b.name); });

      var sectionLabel = (SECTION_CONFIG[dir] && SECTION_CONFIG[dir].label) || dir.charAt(0).toUpperCase() + dir.slice(1);

      let html = '<div class="blog-list">';
      html += '<div class="blog-list-header">';
      html += '<h2 class="blog-list-title">' + escHtml(sectionLabel) + '</h2>';
      html += '<button class="btn btn-primary" onclick="newItemInDirectory(\'' + escAttr(dir) + '\')">+ Neuer Eintrag</button>';
      html += '</div>';

      if (files.length === 0) {
        html += '<p style="color:var(--dark-light);text-align:center;padding:40px;">Noch keine Eintr&auml;ge vorhanden.</p>';
      }

      files.forEach(function(f) {
        if (!f.name.endsWith('.md')) return;
        const name = f.name.replace('.md', '');
        const displayName = fileDisplayName(name);
        html += `
          <div class="blog-entry" onclick="loadFileByPath('${escAttr(f.path)}')">
            <div class="blog-entry-info">
              <h3>${escHtml(displayName)}</h3>
              <span class="blog-entry-meta">${escHtml(f.path)}</span>

  window.loadBlogList = function() { window.loadDirectoryList('blog'); };

  window.loadFileByPath = loadFileByPath;

  window.newItemInDirectory = async function(dir) {
    closeSidebar();
    currentFile = null;
    currentSha = null;
    currentDir = dir;

    // Try to get template from first file in directory
    try {
      var treeDirFiles = contentTree ? contentTree.filter(function(f) {
        return f.startsWith(dir + '/') && f.endsWith('.md');
      }) : [];

      if (treeDirFiles.length > 0) {
        var templatePath = 'src/content/' + treeDirFiles[0];
        var file = await fetchFile(templatePath);
        var raw = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
        var parsed = parseMarkdown(raw);

        // Create empty template based on existing structure
        currentData = {};
        Object.keys(parsed.frontmatter).forEach(function(key) {
          var val = parsed.frontmatter[key];
          if (typeof val === 'boolean') currentData[key] = false;
          else if (typeof val === 'number') currentData[key] = 0;
          else if (Array.isArray(val)) currentData[key] = [];
          else if (key === 'date') currentData[key] = new Date().toISOString().split('T')[0];
          else currentData[key] = '';
        });
        currentBody = '';
        if (parsed.body && parsed.body.trim()) currentBody = '';
      } else {
        currentData = { title: '', slug: '' };
        currentBody = '';
      }
    } catch(e) {
      currentData = { title: '', slug: '' };
      currentBody = '';
    }

    currentFieldDefs = inferFieldDefs(currentData, currentBody || ' ');
    renderEditor(null, currentData, currentBody, true);
  };

      html += '<label>' + escHtml(cf.label) + '</label>';
      html += '<input type="color" id="color_' + cf.key + '" value="' + escAttr(val) + '" onchange="updateColor(\'' + cf.key + '\', this.value)" />';
      html += '<input type="text" id="colorhex_' + cf.key + '" value="' + escAttr(val) + '" onchange="updateColor(\'' + cf.key + '\', this.value)" />';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
    return html;

  window.applyThemePreset = function(key) {
    var p = THEME_PRESETS[key];
    if (!p) return;
    // Update active state
    document.querySelectorAll('.theme-preset-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.preset === key);
    });
    // Update hidden field
    var presetField = document.getElementById('theme_preset');
    if (presetField) presetField.value = key;
    // Update pickers
    Object.keys(p).forEach(function(colorKey) {
      if (colorKey === 'label') return;
      var colorInput = document.getElementById('color_' + colorKey);
      var hexInput = document.getElementById('colorhex_' + colorKey);
      if (colorInput) colorInput.value = p[colorKey];
      if (hexInput) hexInput.value = p[colorKey];
    });
    applyColorsLive(p);
  };

  window.updateColor = function(key, value) {
    var colorInput = document.getElementById('color_' + key);
    var hexInput = document.getElementById('colorhex_' + key);
    if (colorInput && colorInput.value !== value) colorInput.value = value;
    if (hexInput && hexInput.value !== value) hexInput.value = value;
    // Mark as custom
    document.querySelectorAll('.theme-preset-btn').forEach(function(btn) { btn.classList.remove('active'); });
    var presetField = document.getElementById('theme_preset');
    if (presetField) presetField.value = 'custom';
    // Apply live
    var colors = {};
    ['primary', 'primary_light', 'primary_dark', 'accent', 'background', 'text'].forEach(function(k) {
      var el = document.getElementById('color_' + k);
      if (el) colors[k] = el.value;
    });
    applyColorsLive(colors);
  };

  function applyColorsLive(colors) {
    var root = document.documentElement;
    if (colors.primary) root.style.setProperty('--sage', colors.primary);
    if (colors.primary_light) root.style.setProperty('--sage-light', colors.primary_light);
    if (colors.primary_dark) root.style.setProperty('--sage-dark', colors.primary_dark);
    if (colors.accent) root.style.setProperty('--accent', colors.accent);
    if (colors.background) root.style.setProperty('--cream', colors.background);
    if (colors.text) root.style.setProperty('--text-dark', colors.text);
  }

  function hasPreviewTemplate(path) {

    if (rel.startsWith('pages/')) return true;
    return false;
  }

  function markdownToHtml(md) {
    if (!md) return '';
    var html = md;
    // Headings
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    // Unordered lists
    html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
    // Paragraphs (lines not already wrapped)
    html = html.replace(/^(?!<[hulo])((?!<).+)$/gm, '<p>$1</p>');
    // Clean up extra newlines
    html = html.replace(/\n{2,}/g, '\n');
    return html;
  }

  function getPreviewHtml(path, fm, body) {
    var rel = path.replace('src/content/', '');
    if (rel === 'home.md') return renderHomePreview(fm, body);
    if (rel === 'preise.md') return renderPreisePreview(fm, body);
    if (rel.startsWith('angebote/')) return renderAngebotPreview(fm, body);
    if (rel.startsWith('blog/')) return renderBlogPreview(fm, body);
    if (rel.startsWith('pages/')) return renderPagePreview(fm, body);
    return '';
  }

  // =====================
  // Inline edit system
  // =====================

  var currentViewMode = 'preview';

  function attachEditableListeners() {
    var editables = document.querySelectorAll('.site-preview [data-editable]');
    editables.forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var fieldKey = el.getAttribute('data-field');
        var fieldType = el.getAttribute('data-type');
        openEditPanel(fieldKey, fieldType, el);
      });
    });
  }

  function openEditPanel(fieldKey, fieldType, targetEl) {
    // Get current value
    var value = '';
    if (fieldKey === '_body') {
      value = currentBody || '';
    } else if (fieldKey.indexOf('.') !== -1) {
      // Nested: e.g. testimonials.0.quote
      var parts = fieldKey.split('.');
      var obj = currentData;
      for (var i = 0; i < parts.length; i++) {
        if (obj == null) break;
        var k = isNaN(parts[i]) ? parts[i] : parseInt(parts[i], 10);
        obj = obj[k];
      }
      value = obj != null ? obj : '';
    } else {
      value = currentData[fieldKey] != null ? currentData[fieldKey] : '';
    }

    var label = autoLabel(fieldKey.split('.').pop());

    var overlay = document.createElement('div');
    overlay.className = 'edit-overlay';
    overlay.id = 'editOverlay';

    var panelHtml = '<div class="edit-panel">';
    panelHtml += '<h3>' + escHtml(label) + ' bearbeiten</h3>';

    if (fieldType === 'body') {
      panelHtml += '<textarea class="form-textarea body-editor" id="editPanelInput" style="min-height:300px;">' + escHtml(String(value)) + '</textarea>';
    } else if (fieldType === 'text') {
      panelHtml += '<textarea class="form-textarea" id="editPanelInput" style="min-height:120px;">' + escHtml(String(value)) + '</textarea>';
    } else if (fieldType === 'image') {
      panelHtml += '<div class="image-field">';
      panelHtml += '<div class="image-preview" id="editPanelPreview">';
      if (value) {
        panelHtml += '<img src="' + escAttr(String(value)) + '" alt="Vorschau" />';
      } else {
        panelHtml += '<span class="image-preview-empty">Kein Bild</span>';
      }
      panelHtml += '</div>';
      panelHtml += '<div class="image-upload-row">';
      panelHtml += '<input class="form-input" type="text" id="editPanelInput" value="' + escAttr(String(value)) + '" placeholder="/images/beispiel.jpg" />';
      panelHtml += '<input type="file" id="editPanelFile" accept="image/*" style="display:none" />';
      panelHtml += '<button type="button" class="btn-upload" id="editPanelUploadBtn">&#128247; Hochladen</button>';
      panelHtml += '</div>';
      panelHtml += '<div class="image-upload-status" id="editPanelStatus"></div>';
      panelHtml += '</div>';
    } else if (fieldType === 'date') {
      panelHtml += '<input class="form-input" type="date" id="editPanelInput" value="' + escAttr(formatDate(value)) + '" />';
    } else if (fieldType === 'number') {
      panelHtml += '<input class="form-input" type="number" id="editPanelInput" value="' + escAttr(String(value)) + '" />';
    } else {
      panelHtml += '<input class="form-input" type="text" id="editPanelInput" value="' + escAttr(String(value)) + '" />';
    }

    panelHtml += '<div class="edit-panel-actions">';
    panelHtml += '<button class="btn btn-secondary" id="editPanelCancel">Abbrechen</button>';
    panelHtml += '<button class="btn btn-primary" id="editPanelApply">&Uuml;bernehmen</button>';
    panelHtml += '</div>';
    panelHtml += '</div>';

    overlay.innerHTML = panelHtml;
    document.body.appendChild(overlay);

    // Focus the input
    var inputEl = document.getElementById('editPanelInput');
    if (inputEl) inputEl.focus();

    // Image upload handling
    if (fieldType === 'image') {
      document.getElementById('editPanelUploadBtn').addEventListener('click', function() {
        document.getElementById('editPanelFile').click();
      });
      document.getElementById('editPanelFile').addEventListener('change', function() {
        handleEditPanelImageUpload(this);
      });
    }

    // Cancel
    document.getElementById('editPanelCancel').addEventListener('click', function() {
      closeEditPanel();
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeEditPanel();
    });

    // Apply
    document.getElementById('editPanelApply').addEventListener('click', function() {
      applyEditPanel(fieldKey, fieldType, targetEl);
    });

    // Enter key for single-line inputs
    if (fieldType === 'string' || fieldType === 'date' || fieldType === 'number') {
      inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          applyEditPanel(fieldKey, fieldType, targetEl);
        }
      });
    }
  }

  function closeEditPanel() {
    var overlay = document.getElementById('editOverlay');
    if (overlay) overlay.remove();
  }

  function applyEditPanel(fieldKey, fieldType, targetEl) {
    var inputEl = document.getElementById('editPanelInput');
    if (!inputEl) return;
    var newValue = inputEl.value;

    // Convert type
    if (fieldType === 'number') {
      newValue = parseInt(newValue, 10) || 0;
    }

    // Update data model
    if (fieldKey === '_body') {
      currentBody = newValue;
    } else if (fieldKey.indexOf('.') !== -1) {
      // Nested: e.g. testimonials.0.quote
      var parts = fieldKey.split('.');
      var obj = currentData;
      for (var i = 0; i < parts.length - 1; i++) {
        var k = isNaN(parts[i]) ? parts[i] : parseInt(parts[i], 10);
        if (obj[k] == null) obj[k] = {};
        obj = obj[k];
      }
      var lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1], 10);
      obj[lastKey] = newValue;
    } else {
      currentData[fieldKey] = newValue;
    }

    // Update visual element
    if (targetEl) {
      if (fieldType === 'image') {
        if (targetEl.tagName === 'IMG') {
          targetEl.src = newValue;
        }
      } else if (fieldType === 'body') {
        targetEl.innerHTML = markdownToHtml(newValue);
      } else if (fieldKey.indexOf('.stars') !== -1) {
        // Stars → render star characters
        var starCount = parseInt(newValue, 10) || 5;
        var starHtml = '';
        for (var s = 0; s < starCount; s++) starHtml += '\u2605';
        targetEl.textContent = starHtml;
      } else {
        targetEl.textContent = newValue;
      }
    }

    closeEditPanel();
  }

  async function handleEditPanelImageUpload(fileInput) {
    var file = fileInput.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      showToast('Bitte nur Bilddateien hochladen', 'error');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showToast('Bild zu gross (max. 10 MB)', 'error');
      return;
    }
    var statusEl = document.getElementById('editPanelStatus');
    statusEl.textContent = 'Wird komprimiert...';
    statusEl.className = 'image-upload-status uploading';
    try {
      var compressed = await compressImage(file, 1600, 1200, 0.82);
      statusEl.textContent = 'Wird hochgeladen (' + compressed.sizeKB + ' KB)...';
      var ts = Date.now();
      var fileName = 'img-' + ts + '.jpg';
      var ghPath = 'public/images/' + fileName;
      var uploadRes = await ghFetch('/repos/' + REPO + '/contents/' + ghPath, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Upload Bild: ' + fileName, content: compressed.base64, branch: BRANCH })
      });
      if (!uploadRes.ok) {
        var err = await uploadRes.json();
        throw new Error(err.message || 'Upload fehlgeschlagen');
      }
      var imgPath = '/images/' + fileName;
      document.getElementById('editPanelInput').value = imgPath;
      var previewEl = document.getElementById('editPanelPreview');
      previewEl.innerHTML = '<img src="data:image/jpeg;base64,' + compressed.base64 + '" alt="Vorschau" />';
      statusEl.textContent = 'Hochgeladen: ' + fileName;
      statusEl.className = 'image-upload-status';
      showToast('Bild hochgeladen!', 'success');
    } catch(err) {
      statusEl.textContent = 'Fehler: ' + err.message;
      statusEl.className = 'image-upload-status error';
    }
  }

  window.switchView = function(mode) {
    currentViewMode = mode;
    var previewContainer = document.getElementById('previewContainer');
    var formContainer = document.getElementById('formContainer');
    var togglePreview = document.getElementById('togglePreview');
    var toggleForm = document.getElementById('toggleForm');

    if (mode === 'preview') {
      // If form is visible, collect form data first to sync edits
      if (formContainer && formContainer.classList.contains('active')) {
        var formEl = document.getElementById('editorForm');
        if (formEl) {
          currentViewMode = 'form'; // temporarily set for collectFormData
          var collected = collectFormData();
          currentData = collected.frontmatter;
          currentBody = collected.body;
          currentViewMode = 'preview';
        }
      }
      if (previewContainer) {
        previewContainer.classList.remove('hidden');
        previewContainer.innerHTML = getPreviewHtml(currentFile, currentData, currentBody);
        setTimeout(function() { attachEditableListeners(); }, 50);
      }
      if (formContainer) formContainer.classList.remove('active');
      if (togglePreview) togglePreview.classList.add('active');
      if (toggleForm) toggleForm.classList.remove('active');
    } else {
      // Switching to form — data is already up-to-date in currentData/currentBody
      if (previewContainer) previewContainer.classList.add('hidden');
      if (formContainer) {
        formContainer.classList.add('active');
        // Re-render form with potentially updated data from inline edits
        var formHtml = '';
        currentFieldDefs.forEach(function(field) {
          formHtml += renderField(field, currentData, currentBody);
        });
        formContainer.innerHTML = '<form id="editorForm" onsubmit="return false;">' + formHtml + '</form>';
      }
      if (togglePreview) togglePreview.classList.remove('active');
      if (toggleForm) toggleForm.classList.add('active');
    }
  };

  function renderEditor(path, frontmatter, body, isNew) {
    const fields = currentFieldDefs;
    var sectionLabel = currentDir ? ((SECTION_CONFIG[currentDir] && SECTION_CONFIG[currentDir].label) || currentDir.charAt(0).toUpperCase() + currentDir.slice(1)) : '';
    const title = isNew ? ('Neuer Eintrag' + (sectionLabel ? ' (' + sectionLabel + ')' : '')) : getLabel(path);
    var showPreview = !isNew && path && hasPreviewTemplate(path);

    let html = '<div class="editor">';
    html += '<div class="editor-header">';
    html += '<div>';
    html += '<h2 class="editor-title">' + escHtml(title) + '</h2>';
    if (path) html += '<span class="editor-path">' + escHtml(path) + '</span>';
    html += '</div>';

    if (showPreview) {
      html += '<div class="view-toggle">';
      html += '<button type="button" class="view-toggle-btn active" id="togglePreview" onclick="switchView(\'preview\')">Vorschau</button>';
      html += '<button type="button" class="view-toggle-btn" id="toggleForm" onclick="switchView(\'form\')">Formular</button>';
      html += '</div>';
    }

    html += '<div class="editor-actions">';
    // Show delete button for collection items (files in subdirectories), not root singletons
    if (!isNew && currentDir) {
      html += '<button class="btn btn-danger" onclick="deleteCollectionItem()">L&ouml;schen</button>';
    }
    html += '<button class="btn btn-primary" id="btnSave" onclick="saveCurrentFile()">Speichern</button>';
    html += '</div>';
    html += '</div>';

    if (currentFile === 'src/content/site.md') {
      html += renderThemeEditor(frontmatter);
      html += '<input type="hidden" id="theme_preset" name="theme_preset" value="' + escAttr(frontmatter.theme_preset || 'sage') + '" />';
    }

    if (showPreview) {
      // Preview container (visible by default)
      html += '<div id="previewContainer" class="preview-container">';
      html += getPreviewHtml(path, frontmatter, body);
      html += '</div>';

      // Form container (hidden by default)
      html += '<div id="formContainer" class="form-container">';
      html += '<form id="editorForm" onsubmit="return false;">';
      fields.forEach(function(field) {
        html += renderField(field, frontmatter, body);
      });
      html += '</form>';
      html += '</div>';
    } else {
      // No preview — just show form
      html += '<form id="editorForm" onsubmit="return false;">';
      fields.forEach(function(field) {
        html += renderField(field, frontmatter, body);
      });
      html += '</form>';
    }

    html += '</div>';

    document.getElementById('mainContent').innerHTML = html;
    currentViewMode = showPreview ? 'preview' : 'form';

    if (showPreview) {
      setTimeout(function() { attachEditableListeners(); }, 50);
    }
  }

  function renderField(field, data, body, prefix) {
    const pfx = prefix || '';
    const fieldId = pfx + field.key;
    let value;

    if (field.key === '_body') {
      value = body || '';
    } else {
      value = getNestedValue(data, field.key);
    }

    let html = '';

    switch(field.type) {
      case 'string':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="text" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(value || '') + '" />';
        html += '</div>';
        break;

      case 'text':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<textarea class="form-textarea" id="' + fieldId + '" name="' + fieldId + '">' + escHtml(value || '') + '</textarea>';
        html += '</div>';
        break;

      case 'number':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="number" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(value != null ? value : '') + '" />';
        html += '</div>';
        break;

      case 'date':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<input class="form-input" type="date" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(formatDate(value)) + '" />';
        html += '</div>';
        break;

      case 'boolean':
        html += '<div class="form-group">';
        html += '<div class="form-checkbox-wrap">';
        html += '<input class="form-checkbox" type="checkbox" id="' + fieldId + '" name="' + fieldId + '"' + (value ? ' checked' : '') + ' />';
        html += '<label class="form-checkbox-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '</div>';
        html += '</div>';
        break;

      case 'body':
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + fieldId + '">' + escHtml(field.label) + '</label>';
        html += '<textarea class="form-textarea body-editor" id="' + fieldId + '" name="' + fieldId + '">' + escHtml(value || '') + '</textarea>';
        html += '</div>';
        break;

      case 'image':
        var imgPath = value || '';
        var imgSrc = imgPath ? imgPath : '';
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(field.label) + '</label>';
        html += '<div class="image-field">';
        html += '<div class="image-preview" id="preview_' + fieldId + '">';
        if (imgSrc) {
          html += '<img src="' + escAttr(imgSrc) + '" alt="Vorschau" />';
        } else {
          html += '<span class="image-preview-empty">Kein Bild ausgewaehlt</span>';
        }
        html += '</div>';
        html += '<div class="image-upload-row">';
        html += '<input class="form-input" type="text" id="' + fieldId + '" name="' + fieldId + '" value="' + escAttr(imgPath) + '" placeholder="/images/beispiel.jpg" />';
        html += '<input type="file" id="file_' + fieldId + '" accept="image/*" style="display:none" onchange="handleImageUpload(\'' + fieldId + '\', this)" />';
        html += '<button type="button" class="btn-upload" onclick="document.getElementById(\'file_' + fieldId + '\').click()">&#128247; Hochladen</button>';
        html += '</div>';
        html += '<div class="image-upload-status" id="status_' + fieldId + '"></div>';
        html += '</div>';
        html += '</div>';
        break;

      case 'string-list':
        var items = Array.isArray(value) ? value : [];
        html += '<div class="form-group">';
        html += '<div class="list-field">';
        html += '<div class="list-field-header">';
        html += '<span class="list-field-title">' + escHtml(field.label) + '</span>';
        html += '<div style="display:flex;align-items:center;gap:8px;">';
        html += '<span class="list-field-count">' + items.length + '</span>';
        html += '<button type="button" class="btn-add" onclick="addStringListItem(\'' + fieldId + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
        html += '<div id="list_' + fieldId + '" style="padding:12px 16px;">';
        items.forEach(function(item, i) {
          html += renderStringListItem(fieldId, i, item);
        });
        html += '</div>';
        html += '</div>';
        html += '</div>';
        break;

      case 'object-list':
        var objItems = Array.isArray(value) ? value : [];
        html += '<div class="form-group">';
        html += '<div class="list-field">';
        html += '<div class="list-field-header">';
        html += '<span class="list-field-title">' + escHtml(field.label) + '</span>';
        html += '<div style="display:flex;align-items:center;gap:8px;">';
        html += '<span class="list-field-count" id="count_' + fieldId + '">' + objItems.length + '</span>';
        html += '<button type="button" class="btn-add" onclick="addObjectListItem(\'' + fieldId + '\', \'' + escAttr(JSON.stringify(field.fields)) + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
        html += '<div id="list_' + fieldId + '">';
        objItems.forEach(function(item, i) {
          html += renderObjectListItem(fieldId, i, item, field.fields);
        });
        html += '</div>';
        html += '</div>';
        html += '</div>';
        break;
    }

    return html;
  }

  function renderStringListItem(fieldId, index, value) {
    return '<div class="string-list-item" data-list="' + fieldId + '" data-index="' + index + '">' +
      '<input class="form-input" type="text" name="' + fieldId + '_' + index + '" value="' + escAttr(value || '') + '" />' +
      '<button type="button" class="btn-remove" onclick="removeStringListItem(this)" title="Entfernen">&times;</button>' +
      '</div>';
  }

  function renderObjectListItem(fieldId, index, item, subFields) {
    let html = '<div class="list-item" data-list="' + fieldId + '" data-index="' + index + '">';
    html += '<div class="list-item-header">';
    html += '<span class="list-item-number">#' + (index + 1) + '</span>';
    html += '<div class="list-item-actions">';
    html += '<button type="button" class="btn-move" onclick="moveListItem(this, -1)" title="Nach oben">&uarr;</button>';
    html += '<button type="button" class="btn-move" onclick="moveListItem(this, 1)" title="Nach unten">&darr;</button>';
    html += '<button type="button" class="btn-remove" onclick="removeObjectListItem(this)" title="Entfernen">&times;</button>';
    html += '</div>';
    html += '</div>';

    subFields.forEach(function(sf) {
      var subId = fieldId + '_' + index + '_' + sf.key;
      var subValue = item ? item[sf.key] : '';

      if (sf.type === 'string-list') {
        var subItems = Array.isArray(subValue) ? subValue : [];
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(sf.label) + '</label>';
        html += '<div class="nested-list" id="list_' + subId + '">';
        subItems.forEach(function(si, j) {
          html += '<div class="string-list-item" data-list="' + subId + '" data-index="' + j + '">' +
            '<input class="form-input" type="text" name="' + subId + '_' + j + '" value="' + escAttr(si || '') + '" />' +
            '<button type="button" class="btn-remove" onclick="removeStringListItem(this)" title="Entfernen">&times;</button>' +
            '</div>';
        });
        html += '<button type="button" class="btn-add" style="margin-top:6px;" onclick="addStringListItem(\'' + subId + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
      } else if (sf.type === 'object-list') {
        var nestedItems = Array.isArray(subValue) ? subValue : [];
        html += '<div class="form-group">';
        html += '<label class="form-label">' + escHtml(sf.label) + '</label>';
        html += '<div class="nested-list" id="list_' + subId + '">';
        nestedItems.forEach(function(ni, j) {
          html += renderObjectListItem(subId, j, ni, sf.fields);
        });
        html += '<button type="button" class="btn-add" style="margin-top:6px;" onclick="addObjectListItem(\'' + subId + '\', \'' + escAttr(JSON.stringify(sf.fields)) + '\')">+ Hinzuf&uuml;gen</button>';
        html += '</div>';
        html += '</div>';
      } else if (sf.type === 'text') {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<textarea class="form-textarea" id="' + subId + '" name="' + subId + '">' + escHtml(subValue || '') + '</textarea>';
        html += '</div>';
      } else if (sf.type === 'number') {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<input class="form-input" type="number" id="' + subId + '" name="' + subId + '" value="' + escAttr(subValue != null ? subValue : '') + '" />';
        html += '</div>';
      } else if (sf.type === 'boolean') {
        html += '<div class="form-group">';
        html += '<div class="form-checkbox-wrap">';
        html += '<input class="form-checkbox" type="checkbox" id="' + subId + '" name="' + subId + '"' + (subValue ? ' checked' : '') + ' />';
        html += '<label class="form-checkbox-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '</div>';
        html += '</div>';
      } else {
        html += '<div class="form-group">';
        html += '<label class="form-label" for="' + subId + '">' + escHtml(sf.label) + '</label>';
        html += '<input class="form-input" type="text" id="' + subId + '" name="' + subId + '" value="' + escAttr(subValue || '') + '" />';
        html += '</div>';
      }
    });

    html += '</div>';
    return html;
  }

  // =====================
  // List manipulation
  // =====================

  window.addStringListItem = function(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll('.string-list-item');
    const index = items.length;
    const div = document.createElement('div');
    div.innerHTML = renderStringListItem(fieldId, index, '');
    // Append the actual child, not the wrapper div
    const newItem = div.firstElementChild;
    // Insert before the add button if it's a nested list
    const addBtn = container.querySelector(':scope > .btn-add');
    if (addBtn) {
      container.insertBefore(newItem, addBtn);
    } else {
      container.appendChild(newItem);
    }
    // Update count
    updateListCount(fieldId);
  };

  window.removeStringListItem = function(btn) {
    const item = btn.closest('.string-list-item');
    const fieldId = item.dataset.list;
    item.remove();
    reindexStringList(fieldId);
    updateListCount(fieldId);
  };

  window.addObjectListItem = function(fieldId, fieldsJson) {
    const fields = JSON.parse(fieldsJson);
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    const index = items.length;
    const emptyItem = {};
    fields.forEach(function(f) {
      if (f.type === 'string-list' || f.type === 'object-list') {
        emptyItem[f.key] = [];
      } else if (f.type === 'boolean') {
        emptyItem[f.key] = false;
      } else if (f.type === 'number') {
        emptyItem[f.key] = 0;
      } else {
        emptyItem[f.key] = '';
      }
    });
    const div = document.createElement('div');
    div.innerHTML = renderObjectListItem(fieldId, index, emptyItem, fields);
    const newItem = div.firstElementChild;
    // Insert before the add button if it's a nested list
    const addBtn = container.querySelector(':scope > .btn-add');
    if (addBtn) {
      container.insertBefore(newItem, addBtn);
    } else {
      container.appendChild(newItem);
    }
    updateListCount(fieldId);
  };

  window.removeObjectListItem = function(btn) {
    const item = btn.closest('.list-item');
    const fieldId = item.dataset.list;
    item.remove();
    reindexObjectList(fieldId);
    updateListCount(fieldId);
  };

  window.moveListItem = function(btn, direction) {
    const item = btn.closest('.list-item');
    const container = item.parentNode;
    const items = Array.from(container.querySelectorAll(':scope > .list-item'));
    const idx = items.indexOf(item);
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= items.length) return;

    if (direction === -1) {
      container.insertBefore(item, items[newIdx]);
    } else {
      container.insertBefore(item, items[newIdx].nextSibling);
    }
    reindexObjectList(item.dataset.list);
  };

  function reindexStringList(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll('.string-list-item');
    items.forEach(function(item, i) {
      item.dataset.index = i;
      const input = item.querySelector('input');
      if (input) input.name = fieldId + '_' + i;
    });
  }

  function reindexObjectList(fieldId) {
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    items.forEach(function(item, i) {
      item.dataset.index = i;
      const num = item.querySelector('.list-item-number');
      if (num) num.textContent = '#' + (i + 1);
    });
  }

  function updateListCount(fieldId) {
    const countEl = document.getElementById('count_' + fieldId);
    if (!countEl) return;
    const container = document.getElementById('list_' + fieldId);
    if (!container) return;
    const items = container.querySelectorAll(':scope > .list-item');
    countEl.textContent = items.length;
  }
