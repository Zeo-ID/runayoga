backend:
  name: github
  repo: Zeo-ID/runayoga
  branch: main
  base_url: https://runayoga.pages.dev
  auth_endpoint: /oauth/auth

media_folder: public/images
public_folder: /images

locale: de

collections:
  - name: site
    label: "Seitenweite Daten"
    files:
      - name: site
        label: "Kontaktdaten"
        file: "src/content/site.md"
        fields:
          - { label: "Studio-Name", name: "name", widget: "string" }
          - { label: "E-Mail", name: "email", widget: "string" }
          - { label: "Telefon", name: "phone", widget: "string" }
          - { label: "Adresse", name: "address", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "WhatsApp Nummer", name: "whatsapp", widget: "string" }
          - label: "Öffnungszeiten"
            name: "opening_hours"
            widget: "list"
            fields:
              - { label: "Tag", name: "day", widget: "string" }
              - { label: "Zeiten", name: "hours", widget: "string" }

  - name: home
    label: "Startseite"
    files:
      - name: home
        label: "Startseite"
        file: "src/content/home.md"
        fields:
          - { label: "SEO Titel", name: "seo_title", widget: "string" }
          - { label: "SEO Beschreibung", name: "seo_description", widget: "text" }
          - { label: "Hero Titel", name: "hero_title", widget: "string" }
          - { label: "Hero Untertitel", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Button Text", name: "hero_cta_text", widget: "string" }
          - { label: "Hero Button Link", name: "hero_cta_link", widget: "string" }
          - { label: "Hero Bild", name: "hero_image", widget: "image" }
          - { label: "Philosophie Zitat", name: "philosophy_quote", widget: "text" }
          - { label: "Zitat Quelle", name: "philosophy_cite", widget: "string" }
          - { label: "Über mich Label", name: "about_label", widget: "string" }
          - { label: "Über mich Titel", name: "about_title", widget: "string" }
          - { label: "Über mich Text", name: "about_text", widget: "text" }
          - { label: "Retreat Label", name: "retreat_label", widget: "string" }
          - { label: "Retreat Titel", name: "retreat_title", widget: "string" }
          - { label: "Retreat Text", name: "retreat_text", widget: "text" }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Zitat", name: "quote", widget: "text" }
              - { label: "Autor", name: "author", widget: "string" }
              - { label: "Sterne (1-5)", name: "stars", widget: "number", value_type: "int", min: 1, max: 5 }

  - name: angebote
    label: "Angebote"
    folder: "src/content/angebote"
    create: false
    extension: "md"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Untertitel", name: "subtitle", widget: "string" }
      - { label: "SEO Beschreibung", name: "seo_description", widget: "text" }
      - { label: "Reihenfolge", name: "sort_order", widget: "number", value_type: "int" }
      - label: "Highlights"
        name: "highlights"
        widget: "list"
        field: { label: "Highlight", name: "highlight", widget: "string" }
      - { label: "Für wen geeignet", name: "target_audience", widget: "string", required: false }
      - { label: "Beschreibung", name: "body", widget: "markdown" }

  - name: blog
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", date_format: "YYYY-MM-DD" }
      - { label: "Autor", name: "author", widget: "string", default: "Runa" }
      - { label: "Kurzbeschreibung", name: "excerpt", widget: "text" }
      - { label: "SEO Beschreibung", name: "seo_description", widget: "text", required: false }
      - { label: "Beitragsbild", name: "image", widget: "image", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: preise
    label: "Preise"
    files:
      - name: preise
        label: "Preise & Pakete"
        file: "src/content/preise.md"
        fields:
          - { label: "Seitentitel", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "SEO Beschreibung", name: "seo_description", widget: "text" }
          - label: "Preisgruppen"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Gruppenname", name: "title", widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - label: "Preiskarten"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Preis", name: "price", widget: "string" }
                  - { label: "Zeitraum", name: "period", widget: "string" }
                  - label: "Features"
                    name: "features"
                    widget: "list"
                    field: { label: "Feature", name: "feature", widget: "string" }
                  - { label: "Hervorgehoben", name: "featured", widget: "boolean", default: false }

  - name: pages
    label: "Seiten"
    folder: "src/content/pages"
    create: false
    extension: "md"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Untertitel", name: "subtitle", widget: "string", required: false }
      - { label: "SEO Titel", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Beschreibung", name: "seo_description", widget: "text", required: false }
      - { label: "Inhalt", name: "body", widget: "markdown" }
